<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Faction Drop Spin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

/* ================= BACKGROUND ================= */

body{
margin:0;
font-family:Poppins;
color:white;
background:
radial-gradient(circle at 30% 20%,#00263f,transparent),
radial-gradient(circle at 80% 80%,#00101c,transparent),
linear-gradient(160deg,#00060d,#020f1c,#00060d);
}

/* ================= TOP ================= */

.topbar{
height:70px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
border-bottom:2px solid #00aaff55;
}

.logo{
font-weight:900;
font-size:1.6rem;
color:#00aaff;
}

/* ================= MAIN ================= */

.main{
text-align:center;
padding:30px;
}

.spinner-box{
margin:auto;
max-width:950px;
background:#010912;
border:2px solid #00aaff55;
padding:25px;
}

/* ================= SELECT ================= */

select{
padding:10px;
background:#02121f;
color:white;
border:1px solid #00aaff;
font-weight:700;
margin-bottom:15px;
}

/* ================= SPINNER ================= */

.viewport{
height:200px;
overflow:hidden;
border:2px solid #00aaff;
position:relative;
}

.center-line{
position:absolute;
left:50%;
top:0;
bottom:0;
width:4px;
background:#00aaff;
box-shadow:0 0 25px #00aaff;
}

.reel{
display:flex;
transition:transform 5s cubic-bezier(.15,.8,.2,1);
}

.item{
width:180px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.item img{
width:120px;
height:120px;
object-fit:contain;
}

/* ================= BUTTON ================= */

.spin-btn{
margin-top:20px;
padding:15px 55px;
font-weight:900;
background:linear-gradient(45deg,#008cff,#00e1ff);
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.reward{
text-align:center;
}

.reward img{
width:90px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">Faction Drop System</div>
</div>

<div class="main">

<div class="spinner-box">

<h2>Select Spin Tier</h2>

<select id="tierSelect">
<option value="test">Test Drop</option>
<option value="tier0">Tier 0</option>
<option value="tier1">Tier 1</option>
<option value="tier15">Tier 1.5</option>
<option value="tier2">Tier 2</option>
</select>

<div class="viewport">
<div class="center-line"></div>
<div id="reel" class="reel"></div>
</div>

<button class="spin-btn" onclick="spin()">SPIN</button>

<div id="result"></div>

</div>
</div>

<script>

/* ================= DATABASE ================= */

const DB={

test:[
{name:"Prototype SMG",img:"images/test1.png"},
{name:"Debug Rifle",img:"images/test2.png"}
],

tier0:[
{name:"Faction AR",img:"images/t0_1.png"},
{name:"Commander Pistol",img:"images/t0_2.png"}
],

tier1:[
{name:"Glock",img:"images/glock.png"},
{name:"MP5",img:"images/mp5.png"}
],

tier15:[
{name:"AK Variant",img:"images/ak.png"},
{name:"Combat Shotgun",img:"images/shotgun.png"}
],

tier2:[
{name:"Sniper Elite",img:"images/sniper.png"},
{name:"Heavy LMG",img:"images/lmg.png"}
]

};

/* ================= DROP AMOUNTS ================= */

const dropAmount={
test:2,
tier0:4,
tier1:5,
tier15:5,
tier2:7
};

/* ================= CROSS TIER CHANCES ================= */
/* EDIT THESE VALUES */

const tierPools={
test:["test"],

tier0:["test","tier0"],

tier1:["tier0","tier1"],

tier15:["tier1","tier15"],

tier2:["tier15","tier2"]
};

/* ================= BUILD REEL ================= */

const reel=document.getElementById("reel");

function buildReel(pool){

reel.innerHTML="";

let weapons=[];

pool.forEach(t=>{
weapons=weapons.concat(DB[t]);
});

for(let i=0;i<60;i++){

let w=weapons[Math.floor(Math.random()*weapons.length)];

let div=document.createElement("div");
div.className="item";
div.innerHTML=`<img src="${w.img}"><span>${w.name}</span>`;
reel.appendChild(div);
}

return weapons;
}

/* ================= SPIN ================= */

function spin(){

const tier=document.getElementById("tierSelect").value;

const pool=tierPools[tier];

const weapons=buildReel(pool);

const items=document.querySelectorAll(".item");

let winIndex=Math.floor(Math.random()*items.length);

let offset=(winIndex*180)-(window.innerWidth/2)+90;

reel.style.transform=`translateX(-${offset}px)`;

/* GIVE MULTIPLE REWARDS */

setTimeout(()=>{

const rewards=document.getElementById("result");
rewards.innerHTML="";

for(let i=0;i<dropAmount[tier];i++){

let w=weapons[Math.floor(Math.random()*weapons.length)];

let div=document.createElement("div");
div.className="reward";
div.innerHTML=`<img src="${w.img}"><br>${w.name}`;

rewards.appendChild(div);
}

},5000);

}

/* build first reel */
buildReel(["test"]);

</script>

</body>
</html>
