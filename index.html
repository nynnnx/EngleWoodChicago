<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago | Master Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS remains the same as your original style for consistency */
        body { margin: 0; font-family: 'Poppins', sans-serif; color: white; background: #00050a; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .nav-container { width: 100%; background: #000; border-bottom: 2px solid #00aaff; position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; }
        .top-nav { display: flex; overflow-x: auto; padding: 15px; gap: 15px; }
        .nav-btn, .spin-btn, .theme-select { padding: 10px 25px; background: #02121f; border: 1px solid #00aaff; color: #00aaff; border-radius: 5px; cursor: pointer; font-weight: 700; transition: 0.3s; text-transform: uppercase; font-size: 0.9rem; }
        .nav-btn:hover, .nav-btn.active, .spin-btn:hover:not(:disabled) { background: #00aaff; color: #000; box-shadow: 0 0 15px #00aaff; }
        .theme-select { cursor: pointer; outline: none; appearance: none; background: #02121f; color: #00aaff; padding-right: 30px; }
        .main-wrapper { width: 90%; max-width: 1000px; margin: 40px auto; text-align: center; }
        .section-box { background: rgba(2, 18, 31, 0.8); border: 1px solid #00aaff44; border-radius: 15px; padding: 40px; margin-bottom: 30px; }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .weapon-card { background: #000; border: 1px solid #00aaff33; border-radius: 10px; padding: 15px; text-align: center; }
        .weapon-card img { width: 100%; height: 120px; object-fit: contain; }
        .viewport { height: 200px; overflow: hidden; border: 2px solid #00aaff; position: relative; background: #000; border-radius: 10px; margin: 20px auto; width: 100%; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: #00aaff; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px #00aaff; }
        .reel { display: flex; align-items: center; position: absolute; left: 0; height: 100%; }
        .reel-item { min-width: 180px; width: 180px; text-align: center; }
        .reel-item img { height: 100px; width: 150px; object-fit: contain; }
        #rewards-tray { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }
        .reward-pill { background: #001a2e; border: 1px solid #00aaff; padding: 10px; border-radius: 8px; text-align: center; }
        .reward-pill img { width: 80px; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('test')">Test Drop</div>
            <div class="nav-btn" onclick="showTab('tier0')">Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">Tier 2</div>
            <div class="nav-btn active" onclick="showTab('randomize')">Randomize</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="gallery-view" class="section-box" style="display:none;">
            <h2 id="gallery-title" style="color:#00aaff">WEAPONS</h2>
            <div class="weapon-grid" id="wpn-grid"></div>
        </div>

        <div id="randomize-view" class="section-box">
            <h2 style="color:#00aaff;">Faction Drop Simulator</h2>
            <div style="margin: 20px 0; display: flex; justify-content: center; gap: 15px; align-items: center;">
                <select id="spinTierSelect" class="theme-select">
                    <option value="test">Test Drop</option>
                    <option value="tier0">Tier 0</option>
                    <option value="tier1">Tier 1</option>
                    <option value="tier15">Tier 1.5</option>
                    <option value="tier2">Tier 2</option>
                </select>
                <button class="spin-btn" id="masterSpinBtn" onclick="processFullDrop()">Start Drop</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>
            <h3 id="spin-status" style="color:#00aaff; min-height: 1.5em;"></h3>
            <div id="rewards-tray"></div>
        </div>
    </div>

<script>
/* ============================================================
   EDITABLE CONFIGURATION SECTION
   ============================================================ */

// 1. ADD NEW GUNS HERE (Name and Image Link)
const WEAPON_LIBRARY = {
    "Sentinel": "https://media.discordapp.net/attachments/1428113909616869387/1485721564048523264/WEAPON_RMSENTINELNINE.png",
    "FN509": "https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png",
    "365X": "https://cdn.discordapp.com/attachments/1428113909616869387/1487234175541969068/27dfae38-4cee-494d-9a51-284bd928dedf.png",
    "Glock 22": "https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png",
    "1911": "https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png",
    "Glock 17": "https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png",
    "PX4": "https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png",
    "Dagger": "https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png",
    "Micro Draco": "https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"
};

// 2. ASSIGN GUNS TO TIERS (Just use the names from the Library above)
const TIER_CONFIG = {
    test: ["Sentinel", "FN509"],
    tier0: ["1911", "Glock 17", "PX4"],
    tier1: ["Glock 22"],
    tier15: ["365X", "Dagger"],
    tier2: ["Micro Draco"],
    
    // 3. EDIT HIDDEN WHEEL ITEMS (These show up in Tier 0 Spin but NOT Tier 0 Gallery)
    tier0_ExtraSpinItems: ["Sentinel", "FN509", "365X", "Glock 22"]
};

// 4. HOW MANY ITEMS PER DROP?
const DROP_COUNTS = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 7 };

/* ============================================================
   SYSTEM LOGIC (Don't edit unless you're comfortable with JS)
   ============================================================ */

const ITEM_WIDTH = 180;

function getWeaponData(name) {
    return { name: name, img: WEAPON_LIBRARY[name] || "" };
}

function showTab(tier) {
    const gallery = document.getElementById('gallery-view');
    const randomize = document.getElementById('randomize-view');
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    
    if(tier === 'randomize') {
        gallery.style.display = 'none';
        randomize.style.display = 'block';
    } else {
        gallery.style.display = 'block';
        randomize.style.display = 'none';
        document.getElementById('gallery-title').innerText = tier.toUpperCase();
        renderGrid(tier);
    }
}

function renderGrid(tier) {
    const grid = document.getElementById('wpn-grid');
    grid.innerHTML = "";
    TIER_CONFIG[tier].forEach(name => {
        const item = getWeaponData(name);
        const div = document.createElement('div');
        div.className = "weapon-card";
        div.innerHTML = `<img src="${item.img}"><span class="weapon-name-label">${item.name}</span>`;
        grid.appendChild(div);
    });
}

function buildReel(pool) {
    const reel = document.getElementById('reel');
    reel.innerHTML = "";
    const items = [];
    for(let i=0; i<100; i++) {
        const name = pool[Math.floor(Math.random()*pool.length)];
        const item = getWeaponData(name);
        const div = document.createElement('div');
        div.className = "reel-item";
        div.innerHTML = `<img src="${item.img}"><br><span>${item.name}</span>`;
        reel.appendChild(div);
        items.push(item);
    }
    return items;
}

async function processFullDrop() {
    const tier = document.getElementById('spinTierSelect').value;
    const btn = document.getElementById('masterSpinBtn');
    const tray = document.getElementById('rewards-tray');
    const status = document.getElementById('spin-status');
    
    btn.disabled = true;
    tray.innerHTML = "";

    // Determine the Pool for the spinner
    let activePool = [...TIER_CONFIG[tier]];
    if(tier === 'tier0') {
        activePool = [...activePool, ...TIER_CONFIG.tier0_ExtraSpinItems];
    }

    for(let i=0; i<DROP_COUNTS[tier]; i++) {
        status.innerText = `Spinning ${i+1} of ${DROP_COUNTS[tier]}...`;
        await performSingleSpin(activePool);
        await new Promise(r => setTimeout(r, 800));
    }
    
    status.innerText = "Drop Complete!";
    btn.disabled = false;
}

function performSingleSpin(pool) {
    return new Promise((resolve) => {
        const reel = document.getElementById('reel');
        const viewport = document.querySelector('.viewport');
        const currentReelItems = buildReel(pool);
        const winIndex = 75 + Math.floor(Math.random() * 5);
        const winner = currentReelItems[winIndex];

        reel.style.transition = "none";
        reel.style.transform = "translateX(0px)";
        reel.offsetHeight;

        const targetX = (winIndex * ITEM_WIDTH) - (viewport.offsetWidth / 2) + (ITEM_WIDTH / 2);
        reel.style.transition = "transform 2.5s cubic-bezier(0.15, 0.8, 0.2, 1)";
        reel.style.transform = `translateX(-${targetX}px)`;

        setTimeout(() => {
            const p = document.createElement('div');
            p.className = "reward-pill";
            p.innerHTML = `<img src="${winner.img}"><span>${winner.name}</span>`;
            document.getElementById('rewards-tray').appendChild(p);
            resolve();
        }, 2700);
    });
}
</script>
</body>
</html>
