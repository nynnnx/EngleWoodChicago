<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: #00050a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ================= NAVIGATION ================= */
        .nav-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #00aaff;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .top-nav {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 12px;
            max-width: 100%;
        }

        .nav-btn {
            padding: 8px 20px;
            background: #02121f;
            border: 1px solid #00aaff;
            color: #00aaff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 10px #00aaff;
        }

        /* ================= CENTERED CONTAINER ================= */
        .main-wrapper {
            width: 90%;
            max-width: 900px;
            margin: 40px 0;
            text-align: center;
        }

        .section-box {
            background: rgba(2, 18, 31, 0.8);
            border: 1px solid #00aaff44;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        /* ================= DROPDOWN & SPIN UI ================= */
        .control-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }

        select {
            padding: 10px;
            background: #000;
            color: #ffcc00; /* Yellow text like image */
            border: 1px solid #00aaff;
            border-radius: 5px;
            font-weight: bold;
        }

        /* ================= WHEEL FIX ================= */
        .viewport {
            height: 160px;
            overflow: hidden;
            border: 2px solid #00aaff;
            position: relative;
            background: #000;
            border-radius: 10px;
            margin: 20px auto;
            width: 100%;
        }

        .center-line {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 4px; background: #00aaff; z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 15px #00aaff;
        }

        .reel { display: flex; align-items: center; transition: transform 4s cubic-bezier(.15,.8,.2,1); }
        .reel-item { min-width: 160px; text-align: center; font-size: 0.8rem; }
        .reel-item img { height: 90px; object-fit: contain; }

        .spin-btn {
            padding: 12px 40px;
            background: #6b46c1; /* Purple like image */
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
            border-radius: 5px;
        }

        /* ================= GALLERY ================= */
        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .weapon-card {
            background: #000;
            border: 1px solid #00aaff33;
            padding: 10px;
            border-radius: 8px;
        }

        .weapon-card input {
            background: transparent; border: 1px solid #333;
            color: #00aaff; text-align: center; width: 90%; margin-top: 5px;
        }

        #rewards-tray {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px;
        }

        .pill { background: #001a2e; border: 1px solid #00aaff; padding: 10px; border-radius: 5px; font-size: 0.8rem; }

        /* ================= DRUG RANDOMIZER ================= */
        .drug-title { color: #ff8800; text-transform: uppercase; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('test')">Show Test Drop</div>
            <div class="nav-btn" onclick="showTab('tier0')">Show Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">Show Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">Show Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">Show Tier 2</div>
            <div class="nav-btn" onclick="showTab('attachments')">Show Attachments</div>
            <div class="nav-btn" onclick="showTab('randomize')">Randomize</div>
        </div>
    </div>

    <div class="main-wrapper">
        
        <div id="gallery-view" class="section-box">
            <h2 id="gallery-title">TEST DROP WEAPONS</h2>
            <div class="weapon-grid" id="wpn-grid"></div>
        </div>

        <div id="randomize-view" class="section-box" style="display:none;">
            <p style="color:#00aaff;">Simulate a faction drop spin</p>
            <div class="control-row">
                <span>Choose Tier:</span>
                <select id="spinTierSelect">
                    <option value="test">Test Drops</option>
                    <option value="tier0">Tier 0</option>
                    <option value="tier1">Tier 1</option>
                    <option value="tier15">Tier 1.5</option>
                    <option value="tier2">Tier 2</option>
                    <option value="attachments">Attachments</option>
                </select>
                <button class="spin-btn" onclick="startSpin()">Spin</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>

            <p style="color:#ffcc00;">Your drops</p>
            <div id="rewards-tray"></div>
        </div>

        <div class="section-box">
            <div class="drug-title">Drug Randomizer</div>
            <p style="font-size: 0.8rem; color:#00aaff;">Randomly generate a large batch of drugs (75-100 total for T1, 100-180 for T2)</p>
            <div class="control-row">
                <span>Choose Drug Tier:</span>
                <select id="drugTier">
                    <option>T1</option>
                    <option>T2</option>
                </select>
            </div>
            <button class="spin-btn" style="background:#cc7722" onclick="alert('Drugs Generated!')">Spin Drugs</button>
        </div>
    </div>

<script>
/* ================= DATABASE ================= */
const DB = {
    test: [{name:"Glock 17", img:"https://via.placeholder.com/100/000/00aaff?text=G17"}, {name:"Walther P88", img:"https://via.placeholder.com/100/000/00aaff?text=P88"}],
    tier0: [{name:"Glock 20", img:"https://via.placeholder.com/100/000/00aaff?text=G20"}, {name:"Glock 26", img:"https://via.placeholder.com/100/000/00aaff?text=G26"}],
    tier1: [{name:"HK45", img:"https://via.placeholder.com/100/000/00aaff?text=HK45"}, {name:"Sig P320", img:"https://via.placeholder.com/100/000/00aaff?text=P320"}],
    tier15: [{name:"G19 Gflex", img:"https://via.placeholder.com/100/000/00aaff?text=GFlex"}, {name:"1911", img:"https://via.placeholder.com/100/000/00aaff?text=1911"}],
    tier2: [{name:"Elite Sniper", img:"https://via.placeholder.com/100/000/00aaff?text=Sniper"}, {name:"Heavy LMG", img:"https://via.placeholder.com/100/000/00aaff?text=LMG"}],
    attachments: [{name:"Red Dot", img:"https://via.placeholder.com/100/000/00aaff?text=Sight"}, {name:"Suppressor", img:"https://via.placeholder.com/100/000/00aaff?text=Silencer"}]
};

const spinCounts = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 7, attachments: 3 };

/* ================= LOGIC ================= */
function showTab(tier) {
    const gallery = document.getElementById('gallery-view');
    const randomize = document.getElementById('randomize-view');
    
    if(tier === 'randomize') {
        gallery.style.display = 'none';
        randomize.style.display = 'block';
        buildReel();
    } else {
        gallery.style.display = 'block';
        randomize.style.display = 'none';
        document.getElementById('gallery-title').innerText = tier.toUpperCase() + " WEAPONS";
        renderGrid(tier);
    }
}

function renderGrid(tier) {
    const grid = document.getElementById('wpn-grid');
    grid.innerHTML = "";
    DB[tier].forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = "weapon-card";
        div.innerHTML = `<img src="${item.img}"><br><input type="text" value="${item.name}" onchange="DB['${tier}'][${idx}].name=this.value">`;
        grid.appendChild(div);
    });
}

function buildReel() {
    const reel = document.getElementById('reel');
    reel.style.transition = 'none';
    reel.style.transform = 'translateX(0px)';
    reel.innerHTML = "";
    const all = [...DB.test, ...DB.tier0, ...DB.tier1, ...DB.tier15, ...DB.tier2, ...DB.attachments];
    for(let i=0; i<60; i++) {
        const item = all[Math.floor(Math.random()*all.length)];
        const div = document.createElement('div');
        div.className = "reel-item";
        div.innerHTML = `<img src="${item.img}"><br>${item.name}`;
        reel.appendChild(div);
    }
}

function startSpin() {
    const tier = document.getElementById('spinTierSelect').value;
    const tray = document.getElementById('rewards-tray');
    const reel = document.getElementById('reel');
    tray.innerHTML = "";
    
    const count = spinCounts[tier];
    const itemWidth = 160;
    const winIndex = 40 + Math.floor(Math.random() * 10);
    const offset = (winIndex * itemWidth) - (document.querySelector('.viewport').offsetWidth / 2) + (itemWidth / 2);

    reel.style.transition = "transform 4s cubic-bezier(.15,.8,.2,1)";
    reel.style.transform = `translateX(-${offset}px)`;

    setTimeout(() => {
        for(let i=0; i < count; i++) {
            const winner = DB[tier][Math.floor(Math.random()*DB[tier].length)];
            const p = document.createElement('div');
            p.className = "pill";
            p.innerHTML = `<img src="${winner.img}" width="30"> ${winner.name}`;
            tray.appendChild(p);
        }
    }, 4200);
}

showTab('test');
</script>
</body>
</html>
