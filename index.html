<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTD Shooting | Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ================= THEME & STAR IMAGE ================= */
        :root {
            --accent-blue: #00aaff;
            --accent-green: #00ff44;
            --bg-dark: #00050a;
            /* EDIT THIS URL TO CHANGE THE FALLING STAR IMAGE */
            --star-image: url('https://www.pngall.com/wp-content/uploads/13/Snowflake-PNG-File.png');
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }
        .video-bg iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        /* STAR RAIN SYSTEM */
        #star-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 15px;
            height: 15px;
            background-image: var(--star-image);
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.5;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        /* ORIGINAL NAVIGATION */
        .nav-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--accent-blue);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }
        .top-nav { display: flex; padding: 15px; gap: 15px; }
        .nav-btn, .spin-btn {
            padding: 10px 25px;
            background: #02121f;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active, .spin-btn:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 15px var(--accent-blue);
        }

        /* ORIGINAL MAIN CONTENT BOX */
        .main-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .section-box {
            background: rgba(2, 18, 31, 0.85);
            border: 1px solid #00aaff44;
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        /* MUSIC PLAYER (NOW ON LEFT SIDE) */
        .music-card {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 300px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 101;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .album-art { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .track-info { flex-grow: 1; overflow: hidden; }
        .status-label { font-size: 0.6rem; color: var(--accent-green); font-weight: 900; }
        .song-name { font-size: 0.85rem; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .controls { display: flex; gap: 12px; margin-top: 5px; align-items: center; }
        .ctrl-btn { cursor: pointer; color: white; transition: 0.2s; font-size: 0.9rem; }
        .ctrl-btn:hover { color: var(--accent-green); }

        /* SPINNER VIEWPORT */
        .viewport { height: 200px; overflow: hidden; border: 2px solid var(--accent-blue); position: relative; background: #000; border-radius: 10px; margin: 20px auto; width: 100%; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--accent-blue); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--accent-blue); }
        .reel { display: flex; align-items: center; position: absolute; left: 0; height: 100%; }
        .reel-item { min-width: 180px; text-align: center; }
        .reel-item img { height: 100px; width: 150px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="video-bg">
        <div id="player"></div>
    </div>
    <div class="vignette"></div>

    <div id="star-container"></div>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn">Test Drop</div>
            <div class="nav-btn">Tier 1</div>
            <div class="nav-btn active">Randomize</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="section-box">
            <h2 style="color: var(--accent-blue);">Simulate Faction Drop</h2>
            
            <div style="margin: 20px 0; display: flex; justify-content: center; gap: 15px;">
                <button class="spin-btn" id="sync-btn" onclick="syncAudio()" style="border-color: var(--accent-green); color: var(--accent-green);">Sync & Play Music</button>
                <button class="spin-btn" id="spinBtn" onclick="startSpin()">Start Drop</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>
            <h3 id="status" style="color: var(--accent-blue);">READY</h3>
        </div>
    </div>

    <div class="music-card">
        <img src="https://i.ytimg.com/vi/1-vS-L7o_mQ/hqdefault.jpg" id="m-art" class="album-art">
        <div class="track-info">
            <div class="status-label">NOW PLAYING</div>
            <span id="m-title" class="song-name">First Day Out</span>
            <div class="controls">
                <i class="fas fa-backward ctrl-btn" onclick="changeSong(-1)"></i>
                <i class="fas fa-play ctrl-btn" id="play-btn" onclick="togglePlay()"></i>
                <i class="fas fa-forward ctrl-btn" onclick="changeSong(1)"></i>
                <i class="fas fa-volume-mute ctrl-btn" id="mute-btn" onclick="toggleMute()" style="margin-left:auto;"></i>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const playlist = [
            { id: '1-vS-L7o_mQ', title: 'First Day Out', art: 'https://i.ytimg.com/vi/1-vS-L7o_mQ/hqdefault.jpg' },
            { id: 'dQw4w9WgXcQ', title: 'Next Track', art: 'https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg' }
        ];
        let currentIdx = 0;
        let ytPlayer;

        // --- YOUTUBE SETUP ---
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                videoId: playlist[currentIdx].id,
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': playlist[currentIdx].id },
                events: { 'onReady': (e) => e.target.playVideo() }
            });
        }

        // --- MUSIC FUNCTIONS ---
        function syncAudio() {
            ytPlayer.unMute();
            ytPlayer.playVideo();
            document.getElementById('mute-btn').className = "fas fa-volume-up ctrl-btn";
            document.getElementById('play-btn').className = "fas fa-pause ctrl-btn";
            document.getElementById('sync-btn').style.display = "none";
        }

        function togglePlay() {
            if (ytPlayer.getPlayerState() === 1) {
                ytPlayer.pauseVideo();
                document.getElementById('play-btn').className = "fas fa-play ctrl-btn";
            } else {
                ytPlayer.playVideo();
                document.getElementById('play-btn').className = "fas fa-pause ctrl-btn";
            }
        }

        function toggleMute() {
            if (ytPlayer.isMuted()) {
                ytPlayer.unMute();
                document.getElementById('mute-btn').className = "fas fa-volume-up ctrl-btn";
            } else {
                ytPlayer.mute();
                document.getElementById('mute-btn').className = "fas fa-volume-mute ctrl-btn";
            }
        }

        function changeSong(dir) {
            currentIdx = (currentIdx + dir + playlist.length) % playlist.length;
            ytPlayer.loadVideoById(playlist[currentIdx].id);
            document.getElementById('m-title').innerText = playlist[currentIdx].title;
            document.getElementById('m-art').src = playlist[currentIdx].art;
        }

        // --- STAR RAIN ---
        function createStar() {
            const container = document.getElementById('star-container');
            const star = document.createElement('div');
            star.className = 'star';
            const duration = Math.random() * 3 + 2;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = '-20px';
            star.style.animationDuration = duration + 's';
            container.appendChild(star);
            setTimeout(() => star.remove(), duration * 1000);
        }
        setInterval(createStar, 150);

        // --- ORIGINAL SPIN LOGIC ---
        function startSpin() {
            const reel = document.getElementById('reel');
            reel.innerHTML = "";
            const img = "https://media.discordapp.net/attachments/1428113909616869387/1485721564048523264/WEAPON_RMSENTINELNINE.png";
            for(let i=0; i<60; i++) {
                const div = document.createElement('div');
                div.className = "reel-item";
                div.innerHTML = `<img src="${img}">`;
                reel.appendChild(div);
            }
            reel.style.transition = "none";
            reel.style.transform = "translateX(0)";
            setTimeout(() => {
                reel.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
                reel.style.transform = "translateX(-8000px)";
                document.getElementById('status').innerText = "SPINNING...";
            }, 50);
            setTimeout(() => { document.getElementById('status').innerText = "WINNER!"; }, 4100);
        }
    </script>
</body>
</html>
