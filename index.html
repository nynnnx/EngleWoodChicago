<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ================= EDITABLE SETTINGS ================= */
        :root {
            --accent-blue: #00aaff;
            --accent-green: #00ff44;
            --star-image: url('https://media.discordapp.net/attachments/1438728810265579610/1487566258802135110/image.png?ex=69c99b89&is=69c84a09&hm=af538650e9c2742490672875991a9597c72d3171d88fc675605330044264095e&=&format=webp&quality=lossless&width=550&height=550');
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: #00050a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Local Video Background */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
            background: #000;
        }
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
        }
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Star Rain */
        #star-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 15px; height: 15px;
            background-image: var(--star-image);
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.5;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

        /* Navigation */
        .nav-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #00aaff;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }
        .top-nav { display: flex; overflow-x: auto; padding: 15px; gap: 15px; }
        .nav-btn, .spin-btn, .theme-select {
            padding: 10px 25px;
            background: #02121f;
            border: 1px solid #00aaff;
            color: #00aaff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active, .spin-btn:hover:not(:disabled) {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 15px #00aaff;
        }

        /* Music & Video Controls */
        .music-card {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 320px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 101;
            border: 1px solid rgba(0, 170, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        .album-art { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid #00aaff33; }
        .track-info { flex-grow: 1; overflow: hidden; }
        .status-label { font-size: 0.6rem; color: var(--accent-blue); font-weight: 900; }
        .song-name { font-size: 0.85rem; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
        .controls { display: flex; gap: 15px; align-items: center; }
        .ctrl-btn { cursor: pointer; color: white; transition: 0.2s; font-size: 1rem; }
        .ctrl-btn:hover { color: var(--accent-blue); }

        .file-input-btn {
            font-size: 0.7rem;
            background: transparent;
            border: 1px solid #00aaff;
            color: #00aaff;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
            display: inline-block;
        }

        /* Content Area */
        .main-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .section-box {
            background: rgba(2, 18, 31, 0.85);
            border: 1px solid #00aaff44;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .weapon-card { background: #000; border: 1px solid #00aaff33; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .weapon-card img { width: 100%; height: 120px; object-fit: contain; }
        .weapon-name-label { margin-top: 12px; font-weight: 700; color: #00aaff; font-size: 0.9rem; text-transform: uppercase; }

        /* Wheel System */
        .viewport { height: 200px; overflow: hidden; border: 2px solid #00aaff; position: relative; background: #000; border-radius: 10px; margin: 20px auto; width: 100%; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: #00aaff; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px #00aaff; }
        .reel { display: flex; align-items: center; position: absolute; left: 0; height: 100%; }
        .reel-item { min-width: 180px; width: 180px; text-align: center; }
        .reel-item img { height: 100px; width: 150px; object-fit: contain; }
        #rewards-tray { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }
        .reward-pill { background: #001a2e; border: 1px solid #00aaff; padding: 10px; border-radius: 8px; text-align: center; animation: slideUp 0.4s ease-out; }
        .reward-pill img { width: 80px; display: block; margin: 0 auto; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="video-bg">
        <video id="bg-video" loop muted playsinline>
            <source src="" id="video-source" type="video/mp4">
        </video>
    </div>
    <div class="vignette"></div>
    <div id="star-container"></div>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('test')">Test Drop</div>
            <div class="nav-btn" onclick="showTab('tier0')">Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">Tier 2</div>
            <div class="nav-btn" onclick="showTab('attachments')">Attachments</div>
            <div class="nav-btn active" onclick="showTab('randomize')">Randomize</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="gallery-view" class="section-box" style="display:none;">
            <h2 id="gallery-title" style="color:#00aaff">WEAPONS</h2>
            <div class="weapon-grid" id="wpn-grid"></div>
        </div>

        <div id="randomize-view" class="section-box">
            <h2 style="color:#00aaff;">Simulate a faction drop spin</h2>
            <div style="margin: 20px 0; display: flex; justify-content: center; gap: 15px; align-items: center;">
                <select id="spinTierSelect" class="theme-select">
                    <option value="test">Test Drop</option>
                    <option value="tier0">Tier 0</option>
                    <option value="tier1">Tier 1</option>
                    <option value="tier15">Tier 1.5</option>
                    <option value="tier2">Tier 2</option>
                    <option value="attachments">Attachments</option>
                </select>
                <button class="spin-btn" id="masterSpinBtn" onclick="processFullDrop()">Start Drop</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>
            <h3 id="spin-status" style="color:#00aaff; min-height: 1.5em;"></h3>
            <div id="rewards-tray"></div>
        </div>
    </div>

    <div class="music-card">
        <img src="https://via.placeholder.com/60/00aaff/000000?text=MP4" id="m-art" class="album-art">
        <div class="track-info">
            <div class="status-label">BACKGROUND VIDEO</div>
            <span id="m-title" class="song-name">No Video Selected</span>
            <div class="controls">
                <i class="fas fa-play ctrl-btn" id="play-btn" onclick="toggleVideo()"></i>
                <i class="fas fa-volume-mute ctrl-btn" id="mute-btn" onclick="toggleMute()"></i>
                <label class="file-input-btn">
                    Import MP4 <input type="file" id="video-upload" accept="video/mp4" hidden>
                </label>
            </div>
        </div>
    </div>

    <script>
    const video = document.getElementById('bg-video');
    const videoUpload = document.getElementById('video-upload');
    const songName = document.getElementById('m-title');

    // Handle File Import
    videoUpload.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            document.getElementById('video-source').src = url;
            songName.innerText = file.name;
            video.load();
            video.play();
            document.getElementById('play-btn').className = "fas fa-pause ctrl-btn";
        }
    });

    function toggleVideo() {
        if (video.paused) {
            video.play();
            document.getElementById('play-btn').className = "fas fa-pause ctrl-btn";
        } else {
            video.pause();
            document.getElementById('play-btn').className = "fas fa-play ctrl-btn";
        }
    }

    function toggleMute() {
        video.muted = !video.muted;
        document.getElementById('mute-btn').className = video.muted ? "fas fa-volume-mute ctrl-btn" : "fas fa-volume-up ctrl-btn";
    }

    // Star Rain System
    function createStar() {
        const container = document.getElementById('star-container');
        const star = document.createElement('div');
        star.className = 'star';
        const duration = Math.random() * 3 + 2;
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = '-20px';
        star.style.animationDuration = duration + 's';
        container.appendChild(star);
        setTimeout(() => star.remove(), duration * 1000);
    }
    setInterval(createStar, 150);

    // Database & Logic
    const DB = {
        test: [{name:"Sentinel", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721564048523264/WEAPON_RMSENTINELNINE.png"}],
        tier0: [{name:"1911", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721149903077649/WEAPON_RMTTI2011.png"}],
        tier1: [{name:"Glock 17", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721145243074850/WEAPON_RMG17.png"}],
        tier15: [{name:"Psa Dagger", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721563520176229/WEAPON_RMPSADAGGER.png"}],
        tier2: [{name:"Glock 19 FDE", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721328613982340/WEAPON_RMG19FDEGEN4.png"}],
        attachments: [{name:"Clip", img:"https://media.discordapp.net/attachments/1428113909616869387/1487187729396662353/at_clip_custom_clear.png"}]
    };

    const config = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 7, attachments: 1 };
    const ITEM_WIDTH = 180;

    function showTab(tier) {
        const gallery = document.getElementById('gallery-view');
        const randomize = document.getElementById('randomize-view');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if(tier === 'randomize') { gallery.style.display = 'none'; randomize.style.display = 'block'; } 
        else { gallery.style.display = 'block'; randomize.style.display = 'none'; renderGrid(tier); }
    }

    function renderGrid(tier) {
        const grid = document.getElementById('wpn-grid');
        grid.innerHTML = "";
        DB[tier].forEach(item => {
            const div = document.createElement('div');
            div.className = "weapon-card";
            div.innerHTML = `<img src="${item.img}"><span class="weapon-name-label">${item.name}</span>`;
            grid.appendChild(div);
        });
    }

    function buildReel(pool) {
        const reel = document.getElementById('reel');
        reel.innerHTML = "";
        const items = [];
        for(let i=0; i<100; i++) {
            const w = pool[Math.floor(Math.random()*pool.length)];
            const d = document.createElement('div');
            d.className = "reel-item";
            d.innerHTML = `<img src="${w.img}"><br><span>${w.name}</span>`;
            reel.appendChild(d);
            items.push(w);
        }
        return items;
    }

    async function processFullDrop() {
        const tier = document.getElementById('spinTierSelect').value;
        const count = config[tier];
        const tray = document.getElementById('rewards-tray');
        const status = document.getElementById('spin-status');
        tray.innerHTML = "";
        for(let i=0; i<count; i++) {
            status.innerText = `Spinning ${i+1} of ${count}...`;
            await performSingleSpin(tier);
            await new Promise(r => setTimeout(r, 800));
        }
        status.innerText = "Drop Complete!";
    }

    function performSingleSpin(tier) {
        return new Promise((resolve) => {
            const reel = document.getElementById('reel');
            const items = buildReel(DB[tier]);
            const winIndex = 75;
            reel.style.transition = "none";
            reel.style.transform = "translateX(0px)";
            reel.offsetHeight;
            const targetX = (winIndex * ITEM_WIDTH) - (document.querySelector('.viewport').offsetWidth/2) + (ITEM_WIDTH/2);
            reel.style.transition = "transform 2.5s cubic-bezier(0.15, 0.8, 0.2, 1)";
            reel.style.transform = `translateX(-${targetX}px)`;
            setTimeout(() => {
                const p = document.createElement('div');
                p.className = "reward-pill";
                p.innerHTML = `<img src="${items[winIndex].img}"><span>${items[winIndex].name}</span>`;
                document.getElementById('rewards-tray').appendChild(p);
                resolve();
            }, 2700);
        });
    }
    </script>
</body>
</html>
