<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTD Shooting | Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ================= THEME COLORS ================= */
        :root {
            --accent-blue: #00aaff;
            --accent-green: #00ff44;
            --bg-dark: #00050a;
            /* EDIT THIS URL TO CHANGE THE FALLING STAR IMAGE */
            --star-image: url('https://www.pngall.com/wp-content/uploads/13/Snowflake-PNG-File.png');
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: var(--bg-dark);
            overflow-x: hidden;
            height: 100vh;
        }

        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }
        .video-bg iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* STAR RAIN SYSTEM */
        #star-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            width: 15px;
            height: 15px;
            background-image: var(--star-image);
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.6;
            filter: drop-shadow(0 0 5px white);
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        /* NAVIGATION */
        .nav-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--accent-blue);
            position: relative;
            z-index: 100;
            display: flex;
            justify-content: center;
        }
        .top-nav { display: flex; padding: 15px; gap: 15px; }
        .nav-btn {
            padding: 10px 20px;
            background: #02121f;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .nav-btn.active, .nav-btn:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 15px var(--accent-blue);
        }

        /* MAIN CONTENT */
        .main-wrapper {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 50px auto;
            text-align: center;
        }
        .section-box {
            background: rgba(2, 18, 31, 0.8);
            border: 1px solid rgba(0, 170, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        /* MUSIC PLAYER (BOTTOM LEFT - AS REQUESTED) */
        .music-card {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 320px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .album-art { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }
        .track-info { flex-grow: 1; }
        .status-label { font-size: 0.65rem; color: var(--accent-green); font-weight: 900; letter-spacing: 1px; }
        .song-name { font-size: 0.9rem; font-weight: 700; margin: 2px 0; display: block; }
        .controls { display: flex; gap: 15px; margin-top: 8px; align-items: center; }
        .ctrl-btn { cursor: pointer; font-size: 1rem; transition: 0.2s; color: white; }
        .ctrl-btn:hover { color: var(--accent-green); transform: scale(1.1); }

        /* SPINNER STYLES */
        .viewport { height: 200px; overflow: hidden; border: 2px solid var(--accent-blue); position: relative; background: #000; border-radius: 10px; margin: 20px 0; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--accent-blue); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px var(--accent-blue); }
        .reel { display: flex; align-items: center; position: absolute; left: 0; height: 100%; }
        .reel-item { min-width: 180px; text-align: center; }
        .reel-item img { height: 100px; width: 140px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="video-bg">
        <div id="yt-video"></div>
    </div>
    <div class="vignette"></div>

    <div id="star-container"></div>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn active">Randomize</div>
            <div class="nav-btn">Weapon Gallery</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="section-box">
            <h2 style="color: var(--accent-blue); margin:0;">System Drop Sequence</h2>
            <p style="color: #888; font-size: 0.8rem;">Click Sync Audio to enable sound, then start the drop.</p>
            
            <div style="margin: 20px 0; display: flex; justify-content: center; gap: 10px;">
                <button class="nav-btn" onclick="syncAudio()" id="sync-btn" style="border-color: var(--accent-green); color: var(--accent-green);">Sync Audio</button>
                <button class="nav-btn" id="spinBtn" onclick="startSpin()">Start Drop</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>
            <div id="status-text" style="color: var(--accent-blue); font-weight: bold;">READY</div>
        </div>
    </div>

    <div class="music-card">
        <img src="https://i.ytimg.com/vi/1-vS-L7o_mQ/hqdefault.jpg" id="m-img" class="album-art">
        <div class="track-info">
            <div class="status-label">NOW PLAYING</div>
            <span id="m-title" class="song-name">First Day Out</span>
            <div class="controls">
                <i class="fas fa-step-backward ctrl-btn" onclick="prevTrack()"></i>
                <i class="fas fa-play ctrl-btn" id="play-pause" onclick="togglePlay()"></i>
                <i class="fas fa-step-forward ctrl-btn" onclick="nextTrack()"></i>
                <i class="fas fa-volume-mute ctrl-btn" id="mute-btn" onclick="toggleMute()" style="margin-left:auto;"></i>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- MUSIC CONFIG ---
        const tracks = [
            { id: '1-vS-L7o_mQ', title: 'First Day Out', img: 'https://i.ytimg.com/vi/1-vS-L7o_mQ/hqdefault.jpg' },
            { id: 'dQw4w9WgXcQ', title: 'Alternative Track', img: 'https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg' }
        ];
        let currentTrack = 0;
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-video', {
                videoId: tracks[currentTrack].id,
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': tracks[currentTrack].id },
                events: { 'onReady': (e) => e.target.playVideo() }
            });
        }

        function syncAudio() {
            player.unMute();
            player.playVideo();
            document.getElementById('mute-btn').className = "fas fa-volume-up ctrl-btn";
            document.getElementById('play-pause').className = "fas fa-pause ctrl-btn";
            document.getElementById('sync-btn').style.display = "none";
        }

        function togglePlay() {
            if (player.getPlayerState() === 1) {
                player.pauseVideo();
                document.getElementById('play-pause').className = "fas fa-play ctrl-btn";
            } else {
                player.playVideo();
                document.getElementById('play-pause').className = "fas fa-pause ctrl-btn";
            }
        }

        function toggleMute() {
            if (player.isMuted()) {
                player.unMute();
                document.getElementById('mute-btn').className = "fas fa-volume-up ctrl-btn";
            } else {
                player.mute();
                document.getElementById('mute-btn').className = "fas fa-volume-mute ctrl-btn";
            }
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % tracks.length;
            updatePlayer();
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
            updatePlayer();
        }

        function updatePlayer() {
            player.loadVideoById(tracks[currentTrack].id);
            document.getElementById('m-title').innerText = tracks[currentTrack].title;
            document.getElementById('m-img').src = tracks[currentTrack].img;
        }

        // --- STAR RAIN SYSTEM ---
        function spawnStar() {
            const container = document.getElementById('star-container');
            const star = document.createElement('div');
            star.className = 'star';
            
            const startX = Math.random() * window.innerWidth;
            const duration = Math.random() * 3 + 2; // 2 to 5 seconds
            
            star.style.left = startX + 'px';
            star.style.top = '-20px';
            star.style.animationDuration = duration + 's';
            
            container.appendChild(star);
            setTimeout(() => star.remove(), duration * 1000);
        }
        setInterval(spawnStar, 150); // Speed of rain

        // --- SPINNER LOGIC ---
        const itemImg = "https://media.discordapp.net/attachments/1428113909616869387/1485721564048523264/WEAPON_RMSENTINELNINE.png";
        
        function startSpin() {
            const reel = document.getElementById('reel');
            reel.innerHTML = "";
            for(let i=0; i<50; i++) {
                const div = document.createElement('div');
                div.className = "reel-item";
                div.innerHTML = `<img src="${itemImg}"><br><span style="font-size:10px; color:var(--accent-blue)">ITEM ${i}</span>`;
                reel.appendChild(div);
            }
            reel.style.transition = "none";
            reel.style.transform = "translateX(0)";
            
            setTimeout(() => {
                reel.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
                reel.style.transform = "translateX(-7000px)";
                document.getElementById('status-text').innerText = "SPINNING...";
            }, 50);
            
            setTimeout(() => {
                document.getElementById('status-text').innerText = "WINNER: SENTINEL 9";
            }, 4100);
        }
    </script>
</body>
</html>
