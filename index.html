<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ================= GLOBAL & THEME ================= */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: #00050a; /* Dark Blue */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ================= TOP SCROLLABLE NAV ================= */
        .nav-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #00aaff;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .top-nav {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 15px;
            gap: 15px;
            scrollbar-width: thin;
        }

        .top-nav::-webkit-scrollbar { height: 5px; }
        .top-nav::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 10px; }

        .nav-btn {
            padding: 10px 25px;
            background: #02121f;
            border: 1px solid #00aaff;
            color: #00aaff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 15px #00aaff;
        }

        /* ================= MAIN CONTENT ================= */
        .main-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
        }

        .section-box {
            background: rgba(2, 18, 31, 0.8);
            border: 1px solid #00aaff44;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1, h2 { color: #00aaff; text-transform: uppercase; letter-spacing: 2px; }

        /* ================= WEAPON GALLERY (EDITABLE) ================= */
        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .weapon-card {
            background: #000;
            border: 1px solid #00aaff33;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .weapon-card img { width: 100%; height: 110px; object-fit: contain; }
        .weapon-card input {
            background: #02121f;
            border: 1px solid #00aaff44;
            color: #00aaff;
            text-align: center;
            width: 90%;
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 5px;
            border-radius: 4px;
        }

        /* ================= RANDOMIZER SECTION ================= */
        .control-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }

        select {
            padding: 12px;
            background: #000;
            color: #ffcc00; /* Yellow text */
            border: 1px solid #00aaff;
            border-radius: 5px;
            font-weight: 900;
            cursor: pointer;
        }

        .spin-btn {
            padding: 12px 45px;
            background: #6b46c1; /* Purple */
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .spin-btn:hover { background: #805ad5; transform: scale(1.05); }

        /* ================= WHEEL ================= */
        .viewport {
            height: 180px;
            overflow: hidden;
            border: 2px solid #00aaff;
            position: relative;
            background: #000;
            border-radius: 10px;
            margin: 20px auto;
            width: 100%;
        }

        .center-line {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 4px; background: #00aaff; z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 15px #00aaff;
        }

        .reel { display: flex; align-items: center; transition: transform 4s cubic-bezier(.15,.8,.2,1); }
        .reel-item { min-width: 180px; text-align: center; }
        .reel-item img { height: 100px; object-fit: contain; }

        #rewards-tray {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .reward-pill {
            background: #001a2e;
            border: 1px solid #00aaff;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('test')">Show Test Drop</div>
            <div class="nav-btn" onclick="showTab('tier0')">Show Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">Show Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">Show Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">Show Tier 2</div>
            <div class="nav-btn" onclick="showTab('attachments')">Show Attachments</div>
            <div class="nav-btn active" onclick="showTab('randomize')">Randomize</div>
        </div>
    </div>

    <div class="main-wrapper">
        
        <div id="gallery-view" class="section-box" style="display:none;">
            <h2 id="gallery-title">TEST DROP WEAPONS</h2>
            <div class="weapon-grid" id="wpn-grid"></div>
        </div>

        <div id="randomize-view" class="section-box">
            <h2 style="color:#00aaff; font-size: 1.5rem;">Randomize Drops</h2>
            <p style="color:#00aaff; font-size: 0.9rem;">Simulate a faction drop spin</p>
            
            <div class="control-row">
                <span>Choose Tier:</span>
                <select id="spinTierSelect">
                    <option value="test">Test Drops</option>
                    <option value="tier0">Tier 0</option>
                    <option value="tier1">Tier 1</option>
                    <option value="tier15">Tier 1.5</option>
                    <option value="tier2">Tier 2</option>
                    <option value="attachments">Attachments</option>
                </select>
                <button class="spin-btn" onclick="startSpin()">Spin</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>

            <p style="color:#ffcc00; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Your Drops</p>
            <div id="rewards-tray"></div>
        </div>

    </div>

<script>
/* ================= DATABASE ================= */
const DB = {
    test: [{name:"Sentinel", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721564048523264/WEAPON_RMSENTINELNINE.png?ex=69c782c8&is=69c63148&hm=c10984ab3c4e907ed35b75e1dc5e0eb889d5d407301a74f0d0ec804f1db0f3b5&=&format=webp&quality=lossless&width=563&height=563"}, {name:"FN509", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png?ex=69c78264&is=69c630e4&hm=6d55ffed1773c8970ad32ad206de26bcd6444abf6166aa4d8e7457b268636f5e&=&format=webp&quality=lossless&width=563&height=563"}, {name:"365X", img:"https://via.placeholder.com/150/000/00aaff?text=G17"}, {name:"Glock22", img:"https://via.placeholder.com/150/000/00aaff?text=G17"}, {name:"Glock19X", img:"https://via.placeholder.com/150/000/00aaff?text=P88"}],
    tier0: [{name:"Glock 20", img:"https://via.placeholder.com/150/000/00aaff?text=G20"}, {name:"Glock 26", img:"https://via.placeholder.com/150/000/00aaff?text=G26"}],
    tier1: [{name:"HK45", img:"https://via.placeholder.com/150/000/00aaff?text=HK45"}, {name:"Sig P320", img:"https://via.placeholder.com/150/000/00aaff?text=P320"}],
    tier15: [{name:"G19 Gflex", img:"https://via.placeholder.com/150/000/00aaff?text=GFlex"}, {name:"1911", img:"https://via.placeholder.com/150/000/00aaff?text=1911"}],
    tier2: [{name:"Elite Sniper", img:"https://via.placeholder.com/150/000/00aaff?text=Sniper"}, {name:"Heavy LMG", img:"https://via.placeholder.com/150/000/00aaff?text=LMG"}],
    attachments: [{name:"Red Dot", img:"https://via.placeholder.com/150/000/00aaff?text=Sight"}, {name:"Suppressor", img:"https://via.placeholder.com/150/000/00aaff?text=Silencer"}]
};

const spinCounts = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 7, attachments: 3 };

/* ================= NAVIGATION ================= */
function showTab(tier) {
    const gallery = document.getElementById('gallery-view');
    const randomize = document.getElementById('randomize-view');
    
    // Manage Button States
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    event.currentTarget.classList.add('active');

    if(tier === 'randomize') {
        gallery.style.display = 'none';
        randomize.style.display = 'block';
        buildReel();
    } else {
        gallery.style.display = 'block';
        randomize.style.display = 'none';
        document.getElementById('gallery-title').innerText = tier.toUpperCase() + " WEAPONS";
        renderGrid(tier);
    }
}

/* ================= EDITABLE GRID ================= */
function renderGrid(tier) {
    const grid = document.getElementById('wpn-grid');
    grid.innerHTML = "";
    DB[tier].forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = "weapon-card";
        div.innerHTML = `
            <img src="${item.img}">
            <input type="text" value="${item.name}" onchange="DB['${tier}'][${idx}].name=this.value">
        `;
        grid.appendChild(div);
    });
}

/* ================= SPIN LOGIC ================= */
function buildReel() {
    const reel = document.getElementById('reel');
    reel.style.transition = 'none';
    reel.style.transform = 'translateX(0px)';
    reel.innerHTML = "";
    
    const all = [...DB.test, ...DB.tier0, ...DB.tier1, ...DB.tier15, ...DB.tier2, ...DB.attachments];
    
    // Create long randomized reel
    for(let i=0; i<80; i++) {
        const item = all[Math.floor(Math.random()*all.length)];
        const div = document.createElement('div');
        div.className = "reel-item";
        div.innerHTML = `<img src="${item.img}"><br><span>${item.name}</span>`;
        reel.appendChild(div);
    }
}

function startSpin() {
    const tier = document.getElementById('spinTierSelect').value;
    const tray = document.getElementById('rewards-tray');
    const reel = document.getElementById('reel');
    const spinBtn = document.querySelector('.spin-btn');
    
    tray.innerHTML = "";
    spinBtn.disabled = true;
    
    const itemWidth = 180;
    const winIndex = 50 + Math.floor(Math.random() * 15);
    const viewportWidth = document.querySelector('.viewport').offsetWidth;
    const offset = (winIndex * itemWidth) - (viewportWidth / 2) + (itemWidth / 2);

    reel.style.transition = "transform 4s cubic-bezier(.15,.8,.2,1)";
    reel.style.transform = `translateX(-${offset}px)`;

    setTimeout(() => {
        const count = spinCounts[tier];
        for(let i=0; i < count; i++) {
            const winner = DB[tier][Math.floor(Math.random()*DB[tier].length)];
            const p = document.createElement('div');
            p.className = "reward-pill";
            p.innerHTML = `<img src="${winner.img}" width="40"> <span>${winner.name}</span>`;
            tray.appendChild(p);
        }
        spinBtn.disabled = false;
    }, 4200);
}

// Initial View
buildReel();
</script>
</body>
</html>
