<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ================= ORIGINAL GLOBAL & THEME (UNCHANGED) ================= */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: #00050a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* NEW: Video Background Setup (Hidden behind everything) */
        .video-bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }
        .video-bg-container iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.7); /* Keeps your black theme visible */
            z-index: -1;
        }

        .nav-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #00aaff;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .top-nav {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 15px;
        }

        .nav-btn, .spin-btn, .theme-select {
            padding: 10px 25px;
            background: #02121f;
            border: 1px solid #00aaff;
            color: #00aaff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .nav-btn:hover, .nav-btn.active, .spin-btn:hover:not(:disabled) {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 15px #00aaff;
        }

        .main-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
            z-index: 10;
        }

        .section-box {
            background: rgba(2, 18, 31, 0.85); /* Slightly more opaque for readability */
            border: 1px solid #00aaff44;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        /* ================= NEW: CUSTOM INFO TAB (BOTTOM LEFT) ================= */
        .info-tab {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 250px;
            background: rgba(0, 0, 0, 0.8);
            border-left: 4px solid #00aaff;
            padding: 15px;
            border-radius: 4px;
            z-index: 100;
        }
        .info-title { color: #00aaff; font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
        .staff-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .staff-img { width: 35px; height: 35px; border-radius: 4px; background: #111; border: 1px solid #00aaff33; }
        .staff-name { font-size: 0.85rem; font-weight: 700; display: block; }
        .staff-role { font-size: 0.65rem; color: #00aaff; text-transform: uppercase; }

        /* ================= NEW: MUSIC PLAYER (BOTTOM RIGHT) ================= */
        .music-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 320px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00aaff33;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }
        .music-art { width: 60px; height: 60px; border-radius: 8px; border: 1px solid #00aaff44; }
        .music-details { flex-grow: 1; overflow: hidden; }
        .music-label { font-size: 0.6rem; color: #00aaff; font-weight: 900; }
        .music-name { font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-btns { display: flex; gap: 12px; margin-top: 8px; align-items: center; }
        .m-icon { cursor: pointer; color: white; transition: 0.2s; font-size: 0.9rem; }
        .m-icon:hover { color: #00aaff; }

        /* ================= ORIGINAL WEAPON SYSTEM STYLES (UNCHANGED) ================= */
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .weapon-card { background: #000; border: 1px solid #00aaff33; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .weapon-card img { width: 100%; height: 120px; object-fit: contain; transition: 0.3s; }
        .weapon-card img:hover { filter: drop-shadow(0 0 15px #00aaff); transform: scale(1.05); }
        .weapon-name-label { margin-top: 12px; font-weight: 700; color: #00aaff; font-size: 0.9rem; text-transform: uppercase; }
        .viewport { height: 200px; overflow: hidden; border: 2px solid #00aaff; position: relative; background: #000; border-radius: 10px; margin: 20px auto; width: 100%; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: #00aaff; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px #00aaff; }
        .reel { display: flex; align-items: center; position: absolute; left: 0; height: 100%; }
        .reel-item { min-width: 180px; width: 180px; text-align: center; }
        .reel-item img { height: 100px; width: 150px; object-fit: contain; }
        #rewards-tray { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }
        .reward-pill { background: #001a2e; border: 1px solid #00aaff; padding: 10px; border-radius: 8px; text-align: center; }
        .reward-pill img { width: 80px; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="video-bg-container">
        <div id="yt-player"></div>
    </div>
    <div class="video-overlay"></div>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('test')">Test Drop</div>
            <div class="nav-btn" onclick="showTab('tier0')">Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">Tier 2</div>
            <div class="nav-btn" onclick="showTab('attachments')">Attachments</div>
            <div class="nav-btn active" onclick="showTab('randomize')">Randomize</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="gallery-view" class="section-box" style="display:none;">
            <h2 id="gallery-title" style="color:#00aaff">WEAPONS</h2>
            <div class="weapon-grid" id="wpn-grid"></div>
        </div>

        <div id="randomize-view" class="section-box">
            <h2 style="color:#00aaff;">Simulate a faction drop spin</h2>
            <div style="margin: 20px 0; display: flex; justify-content: center; gap: 15px; align-items: center;">
                <select id="spinTierSelect" class="theme-select">
                    <option value="test">Test Drop</option>
                    <option value="tier0">Tier 0</option>
                    <option value="tier1">Tier 1</option>
                    <option value="tier15">Tier 1.5</option>
                    <option value="tier2">Tier 2</option>
                    <option value="attachments">Attachments</option>
                </select>
                <button class="spin-btn" id="masterSpinBtn" onclick="processFullDrop()">Start Drop</button>
            </div>
            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>
            <h3 id="spin-status" style="color:#00aaff; min-height: 1.5em;"></h3>
            <div id="rewards-tray"></div>
        </div>
    </div>

    <div class="info-tab">
        <div class="info-title">● Senior Faction Management</div>
        <div class="staff-item">
            <img src="https://i.imgur.com/8Q9Z56f.png" class="staff-img">
            <div><span class="staff-name">Nyn</span><span class="staff-role">Senior Faction Management</span></div>
        </div>
        <div class="staff-item">
            <img src="https://i.imgur.com/8Q9Z56f.png" class="staff-img">
            <div><span class="staff-name">Rich</span><span class="staff-role">Management</span></div>
        </div>
    </div>

    <div class="music-widget">
        <img src="https://www.youtube.com/watch?v=kxMthTGjRd4" id="track-art" class="music-art">
        <div class="music-details">
            <div class="music-label">NOW PLAYING</div>
            <div id="track-name" class="music-name">YFG Fatso - Thinkin</div>
            <div class="music-btns">
                <i class="fas fa-backward m-icon" onclick="changeTrack(-1)"></i>
                <i class="fas fa-play m-icon" id="play-pause-btn" onclick="togglePlay()"></i>
                <i class="fas fa-forward m-icon" onclick="changeTrack(1)"></i>
                <i class="fas fa-volume-mute m-icon" id="mute-btn" onclick="toggleMute()" style="margin-left: 10px;"></i>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- MUSIC VIDEO CONTROL ---
        const playlist = [
            { id: '1-vS-L7o_mQ', title: 'YFG Fatso - Thinkin', art: 'https://www.youtube.com/watch?v=kxMthTGjRd4.jpg' },
            { id: 'dQw4w9WgXcQ', title: 'Rick Rollin', art: 'https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg' }
        ];
        let currentTrack = 0;
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: playlist[currentTrack].id,
                playerVars: { 'autoplay': 60, 'controls': 0, 'mute': 1, 'loop': 60, 'playlist': playlist[currentTrack].id },
                events: { 'onReady': (e) => e.target.playVideo() }
            });
        }

        function togglePlay() {
            const state = player.getPlayerState();
            const btn = document.getElementById('play-pause-btn');
            if (state === 1) { player.pauseVideo(); btn.className = "fas fa-play m-icon"; }
            else { player.playVideo(); btn.className = "fas fa-pause m-icon"; }
        }

        function toggleMute() {
            const btn = document.getElementById('mute-btn');
            if (player.isMuted()) { player.unMute(); btn.className = "fas fa-volume-up m-icon"; }
            else { player.mute(); btn.className = "fas fa-volume-mute m-icon"; }
        }

        function changeTrack(dir) {
            currentTrack = (currentTrack + dir + playlist.length) % playlist.length;
            player.loadVideoById(playlist[currentTrack].id);
            document.getElementById('track-name').innerText = playlist[currentTrack].title;
            document.getElementById('track-art').src = playlist[currentTrack].art;
        }

        // --- ALL YOUR ORIGINAL JS LOGIC BELOW ---
        const DB = {
            test: [{name:"Sentinel", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721564048523264/WEAPON_RMSENTINELNINE.png"}],
            tier0: [{name:"1911", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721149903077649/WEAPON_RMTTI2011.png"}],
            tier1: [{name:"Glock 17", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721145243074850/WEAPON_RMG17.png"}],
            tier15: [{name:"Psa Dagger", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721563520176229/WEAPON_RMPSADAGGER.png"}],
            tier2: [{name:"Glock 19 FDE", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721328613982340/WEAPON_RMG19FDEGEN4.png"}],
            attachments: [{name:"Clip", img:"https://media.discordapp.net/attachments/1428113909616869387/1487187729396662353/at_clip_custom_clear.png"}]
        };

        const config = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 7, attachments: 1 };
        const ITEM_WIDTH = 180;

        function showTab(tier) {
            const gallery = document.getElementById('gallery-view');
            const randomize = document.getElementById('randomize-view');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(b => { if(b.innerText.toLowerCase().includes(tier.toLowerCase())) b.classList.add('active'); });
            if(tier === 'randomize') { gallery.style.display = 'none'; randomize.style.display = 'block'; } 
            else { gallery.style.display = 'block'; randomize.style.display = 'none'; document.getElementById('gallery-title').innerText = tier.toUpperCase(); renderGrid(tier); }
        }

        function renderGrid(tier) {
            const grid = document.getElementById('wpn-grid'); grid.innerHTML = "";
            DB[tier].forEach((item) => {
                const div = document.createElement('div'); div.className = "weapon-card";
                div.innerHTML = `<img src="${item.img}"><span class="weapon-name-label">${item.name}</span>`;
                grid.appendChild(div);
            });
        }

        function buildReel(targetPool) {
            const reel = document.getElementById('reel'); reel.innerHTML = "";
            const totalItems = 100; const items = [];
            for(let i=0; i<totalItems; i++) {
                const weapon = targetPool[Math.floor(Math.random()*targetPool.length)];
                const div = document.createElement('div'); div.className = "reel-item";
                div.innerHTML = `<img src="${weapon.img}"><br><span>${weapon.name}</span>`;
                reel.appendChild(div); items.push(weapon);
            }
            return items;
        }

        async function processFullDrop() {
            const tier = document.getElementById('spinTierSelect').value;
            const count = config[tier];
            const btn = document.getElementById('masterSpinBtn');
            const tray = document.getElementById('rewards-tray');
            const status = document.getElementById('spin-status');
            btn.disabled = true; tray.innerHTML = "";
            for(let i=0; i<count; i++) {
                status.innerText = `Spinning ${i+1} of ${count}...`;
                await performSingleSpin(tier);
                await new Promise(r => setTimeout(r, 1000));
            }
            status.innerText = "Drop Complete!"; btn.disabled = false;
        }

        function performSingleSpin(tier) {
            return new Promise((resolve) => {
                const reel = document.getElementById('reel');
                const viewport = document.querySelector('.viewport');
                const tray = document.getElementById('rewards-tray');
                let spinPool = [...DB[tier]];
                const currentReelItems = buildReel(spinPool);
                const winIndex = 75;
                const winner = currentReelItems[winIndex];
                reel.style.transition = "none"; reel.style.transform = "translateX(0px)";
                reel.offsetHeight;
                const centerOffset = (viewport.offsetWidth / 2) - (ITEM_WIDTH / 2);
                const targetX = (winIndex * ITEM_WIDTH) - centerOffset;
                reel.style.transition = "transform 3s cubic-bezier(0.15, 0.8, 0.2, 1)";
                reel.style.transform = `translateX(-${targetX}px)`;
                setTimeout(() => {
                    const p = document.createElement('div'); p.className = "reward-pill";
                    p.innerHTML = `<img src="${winner.img}"><span>${winner.name}</span>`;
                    tray.appendChild(p); resolve();
                }, 3200);
            });
        }
    </script>
</body>
</html>
