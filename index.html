<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ================= GLOBAL & THEME ================= */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: #00050a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .nav-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #00aaff;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .top-nav {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 15px;
        }

        .nav-btn, .spin-btn, .theme-select, .move-select {
            padding: 10px 25px;
            background: #02121f;
            border: 1px solid #00aaff;
            color: #00aaff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .nav-btn:hover, .nav-btn.active, .spin-btn:hover:not(:disabled) {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 15px #00aaff;
        }

        .main-wrapper {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            text-align: center;
        }

        .section-box {
            background: rgba(2, 18, 31, 0.8);
            border: 1px solid #00aaff44;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
        }

        /* ================= GRID & CARDS ================= */
        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .weapon-card {
            background: #000;
            border: 1px solid #00aaff33;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .weapon-card img { 
            width: 100%;
            height: 120px;
            object-fit: contain;
        }

        .weapon-name-label {
            margin: 10px 0;
            font-weight: 700;
            color: #00aaff;
            font-size: 0.85rem;
        }

        .move-select {
            width: 100%;
            padding: 5px;
            font-size: 0.7rem;
            background: #051a2b;
        }

        /* ================= WHEEL SYSTEM ================= */
        .viewport {
            height: 200px;
            overflow: hidden;
            border: 2px solid #00aaff;
            position: relative;
            background: #000;
            border-radius: 10px;
            margin: 20px auto;
            width: 100%;
        }

        .center-line {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 4px; background: #00aaff; z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 15px #00aaff;
        }

        .reel { 
            display: flex; 
            align-items: center; 
            position: absolute;
            left: 0;
            height: 100%;
        }

        .reel-item { 
            min-width: 180px; 
            width: 180px;
            text-align: center; 
        }
        
        .reel-item img { height: 100px; width: 150px; object-fit: contain; }

        #rewards-tray {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .reward-pill {
            background: #001a2e;
            border: 1px solid #00aaff;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .reward-pill img { width: 80px; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('randomize')">Spin Drop</div>
            <div class="nav-btn" onclick="showTab('edit')">Edit Drop Pools</div>
            <div class="nav-btn" onclick="showTab('test')">View Test</div>
            <div class="nav-btn" onclick="showTab('tier0')">View Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">View Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">View Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">View Tier 2</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="randomize-view" class="section-box">
            <h2 style="color:#00aaff;">Faction Drop Simulator</h2>
            <div style="margin: 20px 0; display: flex; justify-content: center; gap: 15px; align-items: center;">
                <select id="spinTierSelect" class="theme-select">
                    <option value="test">Test Drop</option>
                    <option value="tier0">Tier 0</option>
                    <option value="tier1">Tier 1</option>
                    <option value="tier15">Tier 1.5</option>
                    <option value="tier2">Tier 2</option>
                    <option value="attachments">Attachments</option>
                </select>
                <button class="spin-btn" id="masterSpinBtn" onclick="processFullDrop()">Start Drop</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>
            <h3 id="spin-status" style="color:#00aaff; min-height: 1.5em;">Ready</h3>
            <div id="rewards-tray"></div>
        </div>

        <div id="gallery-view" class="section-box" style="display:none;">
            <h2 id="gallery-title" style="color:#00aaff">EDIT POOLS</h2>
            <p id="edit-desc" style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Use the dropdown on each card to move it to a different spin category.</p>
            <div class="weapon-grid" id="wpn-grid"></div>
        </div>
    </div>

<script>
// The Database
let DB = {
    test: [
        {name:"Sentinel", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721564048523264/WEAPON_RMSENTINELNINE.png?width=563&height=563"}, 
        {name:"FN509", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png?width=563&height=563"}, 
        {name:"365X", img:"https://cdn.discordapp.com/attachments/1428113909616869387/1487234175541969068/27dfae38-4cee-494d-9a51-284bd928dedf.png"}, 
        {name:"Glock 22", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"},
    ],
    tier0: [
        {name:"1911", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}, 
        {name:"Glock 17", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"},
        {name:"Glock 19 Gen 5", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"},
        {name:"PX4", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}
    ],
    tier1: [
        {name:"RMGlock 17", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}, 
        {name:"RMGlock 17 Gen 5", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"},
        {name:"Glock 45", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"},
        {name:"Glock 19X", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}
    ],
    tier15: [
        {name:"3 Inch Arp Tan", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"},
        {name:"Psa Dagger", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}
    ],
    tier2: [
        {name:"RMG43x Switch", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}, 
        {name:"Glock Camo", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"},
        {name:"Black Micro Draco", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}
    ],
    attachments: [
        {name:"Clear Vector Clip", img:"https://media.discordapp.net/attachments/1428113909616869387/1487187729396662353/at_clip_custom_clear.png"}
    ]
};

const config = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 7, attachments: 1 };
const ITEM_WIDTH = 180;
let currentView = 'randomize';

function showTab(tier) {
    currentView = tier;
    const gallery = document.getElementById('gallery-view');
    const randomize = document.getElementById('randomize-view');
    
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    
    if(tier === 'randomize') {
        gallery.style.display = 'none';
        randomize.style.display = 'block';
    } else {
        gallery.style.display = 'block';
        randomize.style.display = 'none';
        document.getElementById('gallery-title').innerText = tier === 'edit' ? "ALL WEAPONS (POOL EDITOR)" : tier.toUpperCase();
        renderGrid(tier);
    }
}

function renderGrid(filterTier) {
    const grid = document.getElementById('wpn-grid');
    grid.innerHTML = "";

    // If 'edit' view, show everything. Otherwise show specific tier.
    const tiersToRender = (filterTier === 'edit') ? Object.keys(DB) : [filterTier];

    tiersToRender.forEach(tierName => {
        DB[tierName].forEach((item, index) => {
            const card = document.createElement('div');
            card.className = "weapon-card";
            
            // Create dropdown to move weapon
            let optionsHtml = Object.keys(DB).map(t => 
                `<option value="${t}" ${t === tierName ? 'selected' : ''}>Move to ${t}</option>`
            ).join('');

            card.innerHTML = `
                <div style="font-size:0.6rem; color:#555; align-self:flex-start;">Currently: ${tierName}</div>
                <img src="${item.img}">
                <span class="weapon-name-label">${item.name}</span>
                <select class="move-select" onchange="moveWeapon('${tierName}', ${index}, this.value)">
                    ${optionsHtml}
                </select>
            `;
            grid.appendChild(card);
        });
    });
}

function moveWeapon(oldTier, index, newTier) {
    if (oldTier === newTier) return;
    
    // Remove from old pool
    const weapon = DB[oldTier].splice(index, 1)[0];
    
    // Add to new pool
    DB[newTier].push(weapon);
    
    // Refresh the view
    renderGrid(currentView);
    console.log(`Moved ${weapon.name} from ${oldTier} to ${newTier}`);
}

async function processFullDrop() {
    const tier = document.getElementById('spinTierSelect').value;
    const count = config[tier];
    
    if (!DB[tier] || DB[tier].length === 0) {
        alert("This pool is empty! Move weapons into it using the 'Edit' tab first.");
        return;
    }

    const btn = document.getElementById('masterSpinBtn');
    const tray = document.getElementById('rewards-tray');
    const status = document.getElementById('spin-status');
    
    btn.disabled = true;
    tray.innerHTML = "";

    for(let i=0; i<count; i++) {
        status.innerText = `Spinning ${i+1} of ${count}...`;
        await performSingleSpin(tier);
        await new Promise(r => setTimeout(r, 800));
    }
    
    status.innerText = "Drop Complete!";
    btn.disabled = false;
}

function performSingleSpin(tier) {
    return new Promise((resolve) => {
        const reel = document.getElementById('reel');
        const viewport = document.querySelector('.viewport');
        const tray = document.getElementById('rewards-tray');
        
        // Use the LIVE pool from DB
        const currentPool = DB[tier];
        const totalItems = 100;
        const reelItems = [];
        
        reel.innerHTML = "";
        for(let i=0; i<totalItems; i++) {
            const weapon = currentPool[Math.floor(Math.random()*currentPool.length)];
            const div = document.createElement('div');
            div.className = "reel-item";
            div.innerHTML = `<img src="${weapon.img}"><br><span>${weapon.name}</span>`;
            reel.appendChild(div);
            reelItems.push(weapon);
        }

        const winIndex = 75 + Math.floor(Math.random() * 5);
        const winner = reelItems[winIndex];

        reel.style.transition = "none";
        reel.style.transform = "translateX(0px)";
        reel.offsetHeight;

        const centerOffset = (viewport.offsetWidth / 2) - (ITEM_WIDTH / 2);
        const targetX = (winIndex * ITEM_WIDTH) - centerOffset;

        reel.style.transition = "transform 2.5s cubic-bezier(0.15, 0.8, 0.2, 1)";
        reel.style.transform = `translateX(-${targetX}px)`;

        setTimeout(() => {
            const p = document.createElement('div');
            p.className = "reward-pill";
            p.innerHTML = `<img src="${winner.img}"><span>${winner.name}</span>`;
            tray.appendChild(p);
            resolve();
        }, 2700);
    });
}

// Init
showTab('randomize');
</script>
</body>
</html>
