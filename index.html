<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EngleWoodChicago Spin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

/* ========= CUSTOM BACKGROUND ========= */

body{
margin:0;
font-family:Poppins;
color:white;
overflow:hidden;
background:
radial-gradient(circle at 20% 20%,#00233b,transparent),
radial-gradient(circle at 80% 70%,#00101c,transparent),
linear-gradient(160deg,#00060d,#020f1c,#00060d);
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
from{background-position:0 0;}
to{background-position:200px 100px;}
}

/* ========= TOPBAR ========= */

.topbar{
height:70px;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
border-bottom:2px solid #00aaff44;
}

.logo{
font-size:1.7rem;
font-weight:900;
color:#00aaff;
}

/* ========= SIDE PANEL ========= */

.weapon-panel{
position:fixed;
right:-340px;
top:0;
height:100%;
width:340px;
background:#020d18;
transition:.4s;
overflow:auto;
padding:20px;
}

.weapon-panel.open{
right:0;
}

.category h3{
color:#00aaff;
cursor:pointer;
}

/* WEAPON IMAGE LIST */
.weapon{
display:flex;
align-items:center;
gap:10px;
margin:8px 0;
}

.weapon img{
width:45px;
height:45px;
object-fit:contain;
}

/* ========= SPINNER ========= */

.main{
text-align:center;
padding-top:40px;
}

.spinner-box{
margin:auto;
max-width:900px;
background:#010912;
border:2px solid #00aaff55;
padding:30px;
}

.viewport{
height:200px;
overflow:hidden;
border:2px solid #00aaff;
position:relative;
}

.center-line{
position:absolute;
left:50%;
width:4px;
top:0;
bottom:0;
background:#00aaff;
box-shadow:0 0 25px #00aaff;
z-index:10;
}

.reel{
display:flex;
transition:transform 5s cubic-bezier(.15,.8,.2,1);
}

.item{
width:180px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.item img{
width:120px;
height:120px;
object-fit:contain;
}

/* ========= BUTTON ========= */

.spin-btn{
margin-top:20px;
padding:15px 50px;
font-weight:900;
border:none;
background:linear-gradient(45deg,#008cff,#00e1ff);
cursor:pointer;
color:white;
}

#result img{
width:100px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">EngleWoodChicago Spin</div>
<div onclick="togglePanel()">☰ Weapons</div>
</div>

<!-- SIDE PANEL -->
<div id="panel" class="weapon-panel">

<div class="category">
<h3 onclick="toggleList(this)">Tier 1</h3>
<div class="weapon-list">

<div class="weapon"><img src="images/glock.png"> Glock</div>
<div class="weapon"><img src="images/mp5.png"> MP5</div>

</div>
</div>

<div class="category">
<h3 onclick="toggleList(this)">Tier 1.5</h3>
<div class="weapon-list">

<div class="weapon"><img src="images/ak.png"> AK Variant</div>

</div>
</div>

<div class="category">
<h3 onclick="toggleList(this)">Tier 2</h3>
<div class="weapon-list">

<div class="weapon"><img src="images/sniper.png"> Sniper</div>
<div class="weapon"><img src="images/lmg.png"> Heavy LMG</div>

</div>
</div>

</div>

<!-- MAIN -->
<div class="main">

<h1>Faction Drop Spin</h1>

<div class="spinner-box">

<div class="viewport">
<div class="center-line"></div>
<div id="reel" class="reel"></div>
</div>

<button class="spin-btn" onclick="spin()">SPIN</button>

<div id="result"></div>

</div>
</div>

<script>

/* PANEL */
function togglePanel(){
panel.classList.toggle("open");
}

function toggleList(el){
let list=el.nextElementSibling;
list.style.display=list.style.display==="block"?"none":"block";
}

/* WEAPON DATABASE */
const weapons=[
{name:"Glock",img:"images/glock.png"},
{name:"MP5",img:"images/mp5.png"},
{name:"AK Variant",img:"images/ak.png"},
{name:"Sniper",img:"images/sniper.png"},
{name:"Heavy LMG",img:"images/lmg.png"}
];

const reel=document.getElementById("reel");

/* BUILD REAL REEL */
let reelItems=[];

for(let i=0;i<60;i++){
let weapon=weapons[Math.floor(Math.random()*weapons.length)];

let div=document.createElement("div");
div.className="item";
div.innerHTML=`<img src="${weapon.img}"><span>${weapon.name}</span>`;

reel.appendChild(div);
reelItems.push(div);
}

/* REAL SPIN SYSTEM */
function spin(){

let winnerIndex=Math.floor(Math.random()*reelItems.length);

let offset=
winnerIndex*180
-(window.innerWidth/2)
+90;

reel.style.transform=`translateX(-${offset}px)`;

let weapon=reelItems[winnerIndex].innerHTML;

setTimeout(()=>{
result.innerHTML=
`YOU RECEIVED<br>${weapon}`;
},5000);

}

</script>

</body>
</html>
