<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ================= GLOBAL & THEME ================= */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: #00050a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .nav-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #00aaff;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .top-nav {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 15px;
        }

        .nav-btn, .spin-btn, .theme-select {
            padding: 10px 25px;
            background: #02121f;
            border: 1px solid #00aaff;
            color: #00aaff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .nav-btn:hover, .nav-btn.active, .spin-btn:hover:not(:disabled) {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 15px #00aaff;
        }

        .theme-select {
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            padding-right: 40px;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300aaff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        .main-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
        }

        .section-box {
            background: rgba(2, 18, 31, 0.8);
            border: 1px solid #00aaff44;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
        }

        /* ================= GALLERY & GRID ================= */
        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .weapon-card {
            background: #000;
            border: 1px solid #00aaff33;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .weapon-card img { 
            width: 100%;
            height: 120px;
            object-fit: contain;
            transition: filter 0.3s, transform 0.3s; 
        }
        
        .weapon-card img:hover {
            filter: drop-shadow(0 0 15px #00aaff);
            transform: scale(1.05);
        }

        .weapon-card input {
            background: #02121f;
            border: 1px solid #00aaff44;
            color: #00aaff;
            text-align: center;
            width: 90%;
            margin-top: 10px;
            font-family: 'Poppins', sans-serif;
            padding: 5px;
        }

        /* ================= WHEEL SYSTEM ================= */
        .viewport {
            height: 200px;
            overflow: hidden;
            border: 2px solid #00aaff;
            position: relative;
            background: #000;
            border-radius: 10px;
            margin: 20px auto;
            width: 100%;
        }

        .center-line {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 4px; background: #00aaff; z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 15px #00aaff;
        }

        .reel { 
            display: flex; 
            align-items: center; 
            position: absolute;
            left: 0;
            height: 100%;
        }

        .reel-item { 
            min-width: 180px; 
            width: 180px;
            text-align: center; 
        }
        
        .reel-item img { height: 100px; width: 150px; object-fit: contain; }

        .spin-btn:disabled { 
            background: #111; 
            border-color: #333; 
            color: #555; 
            cursor: not-allowed; 
            box-shadow: none;
        }

        #rewards-tray {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .reward-pill {
            background: #001a2e;
            border: 1px solid #00aaff;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            animation: slideUp 0.4s ease-out;
        }
        .reward-pill img { width: 80px; display: block; margin: 0 auto; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('test')">Test Drop</div>
            <div class="nav-btn" onclick="showTab('tier0')">Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">Tier 2</div>
            <div class="nav-btn" onclick="showTab('attachments')">Attachments</div>
            <div class="nav-btn active" onclick="showTab('randomize')">Randomize</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="gallery-view" class="section-box" style="display:none;">
            <h2 id="gallery-title" style="color:#00aaff">WEAPONS</h2>
            <div class="weapon-grid" id="wpn-grid"></div>
        </div>

        <div id="randomize-view" class="section-box">
            <h2 style="color:#00aaff;">Simulate a faction drop spin</h2>
            <div style="margin: 20px 0; display: flex; justify-content: center; gap: 15px; align-items: center;">
                <select id="spinTierSelect" class="theme-select">
                    <option value="test">Test Drop</option>
                    <option value="tier0">Tier 0</option>
                    <option value="tier1">Tier 1</option>
                    <option value="tier15">Tier 1.5</option>
                    <option value="tier2">Tier 2</option>
                    <option value="halloween">Halloween</option>
                    <option value="attachments">Attachments</option>
                </select>
                <button class="spin-btn" id="masterSpinBtn" onclick="processFullDrop()">Start Drop</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>

            <h3 id="spin-status" style="color:#00aaff; min-height: 1.5em;"></h3>
            <div id="rewards-tray"></div>
        </div>
    </div>

<script>
const DB = {
    test: [
        {name:"Sentinel", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721564048523264/WEAPON_RMSENTINELNINE.png?ex=69c782c8&is=69c63148&hm=c10984ab3c4e907ed35b75e1dc5e0eb889d5d407301a74f0d0ec804f1db0f3b5&=&format=webp&quality=lossless&width=563&height=563"}, 
        {name:"FN509", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png?ex=69c78264&is=69c630e4&hm=6d55ffed1773c8970ad32ad206de26bcd6444abf6166aa4d8e7457b268636f5e&=&format=webp&quality=lossless&width=563&height=563"}, 
        {name:"365X", img:"https://cdn.discordapp.com/attachments/1428113909616869387/1487234175541969068/27dfae38-4cee-494d-9a51-284bd928dedf.png?ex=69c86642&is=69c714c2&hm=817a5a01aa3100c0f02d98092635ef3f16defab5a8b864355da6ba8bcb85e03e&"}, 
        {name:"Glock 22", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"} // Placeholder for Glock 22 from your list
    ],
    tier0: [
        {name:"Glock 20", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}, 
        {name:"Glock 26", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}
        
    ],
    tier1: [
        {name:"HK45", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}, 
        {name:"Sig P320", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"},
        {name:"Glock 19X", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}
    ],
    tier15: [
        {name:"G19 Gflex", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}, 
        {name:"1911", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}
    ],
    tier2: [
        {name:"Elite Sniper", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}, 
        {name:"Heavy LMG", img:"https://media.discordapp.net/attachments/1428113909616869387/1485721144681169112/WEAPON_RMFN509.png"}
    ],
    attachments: [
        {name:"Clear Kriss Vector", img:"https://media.discordapp.net/attachments/1428113909616869387/1487187729396662353/at_clip_custom_clear.png?ex=69c83b01&is=69c6e981&hm=213af0d0a30d7b2acfa5ef541fd9aa0a6b3cecce4b2267e30c3f69f2923e3c59&=&format=webp&quality=lossless&width=550&height=550"}, 
        {name:"White Kriss Vector", img:"https://media.discordapp.net/attachments/1428113909616869387/1487187731695272056/at_clip_40rnd2.png?ex=69c83b01&is=69c6e981&hm=ea2ce045a5f8a1e1562fb080b8f0b7c5071453d5965cce1385d6d7b4d3d91386&=&format=webp&quality=lossless&width=550&height=550"}    ]
};

const config = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 7, attachments: 1 };
const ITEM_WIDTH = 180;

function showTab(tier) {
    const gallery = document.getElementById('gallery-view');
    const randomize = document.getElementById('randomize-view');
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    
    // Find button to activate
    const buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(b => {
        if(b.innerText.toLowerCase().includes(tier.toLowerCase())) b.classList.add('active');
    });

    if(tier === 'randomize') {
        gallery.style.display = 'none';
        randomize.style.display = 'block';
    } else {
        gallery.style.display = 'block';
        randomize.style.display = 'none';
        document.getElementById('gallery-title').innerText = tier.toUpperCase();
        renderGrid(tier);
    }
}

function renderGrid(tier) {
    const grid = document.getElementById('wpn-grid');
    grid.innerHTML = "";
    DB[tier].forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = "weapon-card";
        div.innerHTML = `<img src="${item.img}"><input type="text" value="${item.name}" onchange="DB['${tier}'][${idx}].name=this.value">`;
        grid.appendChild(div);
    });
}

function buildReel(targetPool) {
    const reel = document.getElementById('reel');
    reel.innerHTML = "";
    const totalItems = 100;
    const items = [];
    
    for(let i=0; i<totalItems; i++) {
        const weapon = targetPool[Math.floor(Math.random()*targetPool.length)];
        const div = document.createElement('div');
        div.className = "reel-item";
        div.innerHTML = `<img src="${weapon.img}"><br><span>${weapon.name}</span>`;
        reel.appendChild(div);
        items.push(weapon);
    }
    return items;
}

async function processFullDrop() {
    const tier = document.getElementById('spinTierSelect').value;
    const count = config[tier];
    const btn = document.getElementById('masterSpinBtn');
    const tray = document.getElementById('rewards-tray');
    const status = document.getElementById('spin-status');
    
    btn.disabled = true;
    tray.innerHTML = "";

    for(let i=0; i<count; i++) {
        status.innerText = `Spinning ${i+1} of ${count}...`;
        await performSingleSpin(tier);
        await new Promise(r => setTimeout(r, 1000));
    }
    
    status.innerText = "Drop Complete!";
    btn.disabled = false;
}

function performSingleSpin(tier) {
    return new Promise((resolve) => {
        const reel = document.getElementById('reel');
        const viewport = document.querySelector('.viewport');
        const tray = document.getElementById('rewards-tray');
        
        const currentReelItems = buildReel(DB[tier]);
        const winIndex = 70 + Math.floor(Math.random() * 10);
        const winner = currentReelItems[winIndex];

        reel.style.transition = "none";
        reel.style.transform = "translateX(0px)";
        reel.offsetHeight;

        const centerOffset = (viewport.offsetWidth / 2) - (ITEM_WIDTH / 2);
        const targetX = (winIndex * ITEM_WIDTH) - centerOffset;

        reel.style.transition = "transform 3s cubic-bezier(0.15, 0.8, 0.2, 1)";
        reel.style.transform = `translateX(-${targetX}px)`;

        setTimeout(() => {
            const p = document.createElement('div');
            p.className = "reward-pill";
            p.innerHTML = `<img src="${winner.img}"><span>${winner.name}</span>`;
            tray.appendChild(p);
            resolve();
        }, 3200);
    });
}

buildReel(DB.test);
</script>
</body>
</html>
