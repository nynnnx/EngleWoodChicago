<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faction Drop Spin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* ================= GLOBAL & BACKGROUND ================= */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background-color: #000000; /* Pure Black Background */
            display: flex;
            min-height: 100vh;
        }

        /* ================= SIDEBAR MENU (From Image) ================= */
        .side-menu {
            width: 250px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-right: 1px solid #00aaff33;
        }

        .menu-btn {
            background: #1a1b26;
            color: #b085ff; /* Purple text from image */
            border: 2px solid #6b46c1;
            padding: 12px;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: none;
            font-weight: 400;
        }

        .menu-btn:hover {
            background: #2d2e3f;
            box-shadow: 0 0 15px #6b46c155;
        }

        /* ================= MAIN CONTENT ================= */
        .content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-weight: 900;
            font-size: 2rem;
            color: #00aaff;
            text-shadow: 0 0 10px #00aaff;
            margin-bottom: 30px;
        }

        .spinner-box {
            width: 100%;
            max-width: 900px;
            background: #050505;
            border: 2px solid #00aaff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.1);
            text-align: center;
        }

        select {
            padding: 12px 20px;
            background: #000;
            color: #00aaff;
            border: 1px solid #00aaff;
            font-weight: 700;
            margin-bottom: 25px;
            border-radius: 5px;
        }

        /* ================= SPINNER VISUALS ================= */
        .viewport {
            height: 220px;
            overflow: hidden;
            border: 2px solid #00aaff;
            position: relative;
            background: #0a0a0a;
            border-radius: 10px;
        }

        .center-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #00aaff;
            box-shadow: 0 0 20px #00aaff;
            z-index: 10;
            transform: translateX(-50%);
        }

        .reel {
            display: flex;
            align-items: center;
            transition: transform 5s cubic-bezier(.15,.8,.2,1);
            height: 100%;
        }

        .item {
            min-width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .item img {
            width: 130px;
            height: 130px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px #00aaff33);
        }

        .item span {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }

        /* ================= BUTTON ================= */
        .spin-btn {
            margin-top: 30px;
            padding: 15px 80px;
            font-weight: 900;
            letter-spacing: 2px;
            background: transparent;
            color: #00aaff;
            border: 2px solid #00aaff;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }

        .spin-btn:hover {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 25px #00aaff;
        }

        #result {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .reward {
            background: #111;
            padding: 15px;
            border: 1px solid #00aaff44;
            border-radius: 10px;
            width: 120px;
            text-align: center;
            font-size: 0.8rem;
        }

        .reward img {
            width: 80px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="side-menu">
        <div class="menu-btn" onclick="setTier('test')">Show Test Drop</div>
        <div class="menu-btn" onclick="setTier('tier0')">Show Tier 0</div>
        <div class="menu-btn" onclick="setTier('tier1')">Show Tier 1</div>
        <div class="menu-btn" onclick="setTier('tier15')">Show Tier 1.5</div>
        <div class="menu-btn" onclick="setTier('tier2')">Show Tier 2</div>
        <div class="menu-btn" onclick="setTier('attachments')">Attachment Spin</div>
    </div>

    <div class="content">
        <div class="logo">FACTION DROP SYSTEM</div>

        <div class="spinner-box">
            <select id="tierSelect" onchange="buildReelFromSelect()">
                <option value="test">Test Drop</option>
                <option value="tier0">Tier 0</option>
                <option value="tier1">Tier 1</option>
                <option value="tier15">Tier 1.5</option>
                <option value="tier2">Tier 2</option>
                <option value="attachments">Attachments</option>
            </select>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>

            <button class="spin-btn" onclick="spin()">SPIN</button>
            <div id="result"></div>
        </div>
    </div>

<script>
/* ================= DATABASE ================= */
const DB = {
    test: [
        {name:"Prototype SMG", img:"images/test1.png"},
        {name:"Debug Rifle", img:"images/test2.png"}
    ],
    tier0: [
        {name:"Faction AR", img:"images/t0_1.png"},
        {name:"Commander Pistol", img:"images/t0_2.png"}
    ],
    tier1: [
        {name:"Glock", img:"images/glock.png"},
        {name:"MP5", img:"images/mp5.png"}
    ],
    tier15: [
        {name:"AK Variant", img:"images/ak.png"},
        {name:"Combat Shotgun", img:"images/shotgun.png"}
    ],
    tier2: [
        {name:"Sniper Elite", img:"images/sniper.png"},
        {name:"Heavy LMG", img:"images/lmg.png"}
    ],
    attachments: [
        {name:"Red Dot Sight", img:"images/red_dot.png"},
        {name:"Suppressor", img:"images/silencer.png"},
        {name:"Extended Mag", img:"images/mag.png"},
        {name:"Laser Sight", img:"images/laser.png"}
    ]
};

const dropAmount = { test:2, tier0:4, tier1:5, tier15:5, tier2:7, attachments:3 };
const tierPools = {
    test: ["test"],
    tier0: ["test","tier0"],
    tier1: ["tier0","tier1"],
    tier15: ["tier1","tier15"],
    tier2: ["tier15","tier2"],
    attachments: ["attachments"]
};

const reel = document.getElementById("reel");

/* Helper to set tier via side menu */
function setTier(val) {
    document.getElementById("tierSelect").value = val;
    buildReelFromSelect();
}

function buildReelFromSelect() {
    const tier = document.getElementById("tierSelect").value;
    buildReel(tierPools[tier]);
}

function buildReel(pool) {
    reel.style.transition = "none";
    reel.style.transform = "translateX(0px)";
    reel.innerHTML = "";
    
    let weapons = [];
    pool.forEach(t => { weapons = weapons.concat(DB[t]); });

    for(let i=0; i<60; i++) {
        let w = weapons[Math.floor(Math.random() * weapons.length)];
        let div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<img src="${w.img}"><span>${w.name}</span>`;
        reel.appendChild(div);
    }
    return weapons;
}

function spin() {
    const tier = document.getElementById("tierSelect").value;
    const pool = tierPools[tier];
    const weapons = buildReel(pool);
    
    // Force reflow for transition
    reel.offsetHeight; 
    reel.style.transition = "transform 5s cubic-bezier(.15,.8,.2,1)";

    const itemWidth = 200;
    const winIndex = 45 + Math.floor(Math.random() * 10); // Spin deep into the reel
    const viewportWidth = document.querySelector(".viewport").offsetWidth;
    const offset = (winIndex * itemWidth) - (viewportWidth / 2) + (itemWidth / 2);

    reel.style.transform = `translateX(-${offset}px)`;

    setTimeout(() => {
        const rewards = document.getElementById("result");
        rewards.innerHTML = "";
        for(let i=0; i < dropAmount[tier]; i++){
            let w = weapons[Math.floor(Math.random() * weapons.length)];
            let div = document.createElement("div");
            div.className = "reward";
            div.innerHTML = `<img src="${w.img}"><br>${w.name}`;
            rewards.appendChild(div);
        }
    }, 5000);
}

// Initial Build
buildReel(["test"]);
</script>
</body>
</html>
