<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ================= GLOBAL & THEME ================= */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: #00050a; /* Very Dark Blue */
            overflow-x: hidden;
        }

        /* ================= TOP SCROLLABLE NAV ================= */
        .nav-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #00aaff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-nav {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 15px;
            gap: 15px;
            scrollbar-width: thin;
        }

        .top-nav::-webkit-scrollbar { height: 5px; }
        .top-nav::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 10px; }

        .nav-btn {
            padding: 10px 25px;
            background: #02121f;
            border: 1px solid #00aaff;
            color: #00aaff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 15px #00aaff;
        }

        /* ================= LAYOUT ================= */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h1 { text-align: center; color: #00aaff; text-transform: uppercase; letter-spacing: 4px; }

        /* ================= WEAPON GALLERY (Grid View) ================= */
        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .weapon-card {
            background: #02121f;
            border: 1px solid #00aaff44;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            transition: 0.2s;
        }

        .weapon-card img { width: 100%; height: 100px; object-fit: contain; }
        .weapon-card input {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            width: 100%;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* ================= SPINNER VIEW (Randomize Tab) ================= */
        #spinner-view {
            display: none; /* Hidden by default */
            text-align: center;
        }

        .viewport {
            height: 200px;
            overflow: hidden;
            border: 2px solid #00aaff;
            position: relative;
            background: #000;
            margin: 20px 0;
        }

        .center-line {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 4px; background: #00aaff; z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 20px #00aaff;
        }

        .reel { display: flex; align-items: center; transition: transform 5s cubic-bezier(.15,.8,.2,1); }
        .reel-item { min-width: 180px; text-align: center; }
        .reel-item img { height: 120px; }

        .spin-btn {
            padding: 15px 60px;
            background: #00aaff;
            color: #000;
            border: none;
            font-weight: 900;
            cursor: pointer;
            border-radius: 50px;
        }

        #rewards-tray {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .reward-pill {
            background: rgba(0, 170, 255, 0.1);
            border: 1px solid #00aaff;
            padding: 10px;
            border-radius: 10px;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="nav-container">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('test')">Show Test Drop</div>
            <div class="nav-btn" onclick="showTab('tier0')">Show Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">Show Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">Show Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">Show Tier 2</div>
            <div class="nav-btn" onclick="showTab('randomize')">Randomize</div>
        </div>
    </div>

    <div class="container">
        <h1 id="view-title">Test Drop Weapons</h1>

        <div id="gallery-view" class="weapon-grid"></div>

        <div id="spinner-view">
            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>
            <button class="spin-btn" onclick="startMultiSpin()">START SPIN SEQUENCE</button>
            <div id="rewards-tray"></div>
        </div>
    </div>

<script>
/* ================= CONFIGURATION ================= */
const DB = {
    test: [
        {name:"Glock 17", img:"https://via.placeholder.com/150/222/00aaff?text=G17"},
        {name:"Walther P88", img:"https://via.placeholder.com/150/222/00aaff?text=P88"}
    ],
    tier0: [
        {name:"Glock 20", img:"https://via.placeholder.com/150/222/00aaff?text=G20"},
        {name:"Glock 26", img:"https://via.placeholder.com/150/222/00aaff?text=G26"}
    ],
    tier1: [
        {name:"HK45", img:"https://via.placeholder.com/150/222/00aaff?text=HK45"},
        {name:"Sig P320", img:"https://via.placeholder.com/150/222/00aaff?text=P320"}
    ],
    tier15: [
        {name:"G19 Gflex", img:"https://via.placeholder.com/150/222/00aaff?text=GFlex"},
        {name:"1911", img:"https://via.placeholder.com/150/222/00aaff?text=1911"}
    ],
    tier2: [
        {name:"Elite Sniper", img:"https://via.placeholder.com/150/222/00aaff?text=Sniper"},
        {name:"Heavy LMG", img:"https://via.placeholder.com/150/222/00aaff?text=LMG"}
    ]
};

const spinCounts = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 6 };
let currentTier = 'test';

/* ================= NAVIGATION ================= */
function showTab(tier) {
    currentTier = tier;
    
    // UI Cleanup
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('gallery-view').style.display = 'none';
    document.getElementById('spinner-view').style.display = 'none';

    if(tier === 'randomize') {
        document.getElementById('view-title').innerText = "Wheel Spin Casino";
        document.getElementById('spinner-view').style.display = 'block';
        buildReel();
    } else {
        document.getElementById('view-title').innerText = tier.toUpperCase() + " WEAPONS";
        document.getElementById('gallery-view').style.display = 'grid';
        renderGallery(tier);
    }
}

/* ================= GALLERY (EDITABLE) ================= */
function renderGallery(tier) {
    const gallery = document.getElementById('gallery-view');
    gallery.innerHTML = "";
    DB[tier].forEach((wpn, index) => {
        const card = document.createElement('div');
        card.className = "weapon-card";
        card.innerHTML = `
            <img src="${wpn.img}">
            <input type="text" value="${wpn.name}" onchange="updateWpnName('${tier}', ${index}, this.value)">
        `;
        gallery.appendChild(card);
    });
}

function updateWpnName(tier, index, newVal) {
    DB[tier][index].name = newVal;
}

/* ================= SPINNER LOGIC ================= */
function buildReel() {
    const reel = document.getElementById('reel');
    reel.style.transition = 'none';
    reel.style.transform = 'translateX(0px)';
    reel.innerHTML = "";
    
    // Combine all weapons for the "Randomize" feel
    const allWeapons = [...DB.test, ...DB.tier0, ...DB.tier1, ...DB.tier15, ...DB.tier2];
    
    for(let i=0; i<80; i++) {
        const w = allWeapons[Math.floor(Math.random()*allWeapons.length)];
        const div = document.createElement('div');
        div.className = "reel-item";
        div.innerHTML = `<img src="${w.img}"><br>${w.name}`;
        reel.appendChild(div);
    }
    return allWeapons;
}

async function startMultiSpin() {
    const tray = document.getElementById('rewards-tray');
    const spinBtn = document.querySelector('.spin-btn');
    tray.innerHTML = "";
    spinBtn.disabled = true;

    // Based on the last selected Tier tab
    const count = spinCounts[currentTier] || 1;
    
    for(let i=0; i < count; i++) {
        await runSingleSpin();
        // Brief pause between spins
        await new Promise(r => setTimeout(r, 1000));
    }
    
    spinBtn.disabled = false;
}

function runSingleSpin() {
    return new Promise(resolve => {
        const reel = document.getElementById('reel');
        const allWeapons = [...DB.test, ...DB.tier0, ...DB.tier1, ...DB.tier15, ...DB.tier2];
        
        const itemWidth = 180;
        const winIndex = 50 + Math.floor(Math.random() * 10);
        const offset = (winIndex * itemWidth) - (window.innerWidth/2) + (itemWidth/2);
        
        reel.style.transition = "transform 3s cubic-bezier(.15,.8,.2,1)";
        reel.style.transform = `translateX(-${offset}px)`;

        setTimeout(() => {
            const tray = document.getElementById('rewards-tray');
            const winner = allWeapons[Math.floor(Math.random()*allWeapons.length)];
            
            const pill = document.createElement('div');
            pill.className = "reward-pill";
            pill.innerHTML = `<img src="${winner.img}" width="50"><br>${winner.name}`;
            tray.appendChild(pill);
            
            // Reset for next spin
            reel.style.transition = "none";
            reel.style.transform = "translateX(0px)";
            resolve();
        }, 3500);
    });
}

// Init
showTab('test');
</script>
</body>
</html>
