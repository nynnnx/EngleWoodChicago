<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago | Weapon Drop System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ================= THEME SETTINGS ================= */
        :root {
            --accent-blue: #00aaff;
            --accent-green: #00ff44;
            --bg-dark: #00050a;
            --panel-bg: rgba(2, 18, 31, 0.85);
            --star-image: url('images/Star.png');
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }
        .video-bg iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.2);
        }
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%);
            z-index: -1;
        }

        /* Star Rain */
        #star-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 15px; height: 15px;
            background-image: var(--star-image);
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.5;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

        /* Navigation */
        .nav-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid var(--accent-blue);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 30px;
        }
        .logo {
            width: 80px;
            height: auto;
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            filter: drop-shadow(0 0 10px var(--accent-blue));
        }
        .top-nav { display: flex; overflow-x: auto; padding: 15px; gap: 15px; margin-left: 110px; }
        .nav-btn, .spin-btn, .theme-select {
            padding: 10px 25px;
            background: #02121f;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active, .spin-btn:hover:not(:disabled) {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 15px var(--accent-blue);
        }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Music Player Tray */
        .music-card {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 300px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 101;
            border: 1px solid rgba(0, 170, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        .album-art { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .track-info { flex-grow: 1; overflow: hidden; }
        .song-name { font-size: 0.8rem; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .controls { display: flex; gap: 10px; margin-top: 5px; }
        .ctrl-btn { cursor: pointer; color: white; transition: 0.2s; font-size: 0.8rem; }
        .ctrl-btn:hover { color: var(--accent-blue); }

        /* Main Content */
        .main-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .section-box {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 170, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(5px);
        }

        /* Wheel System */
        .viewport { 
            height: 200px; 
            overflow: hidden; 
            border: 2px solid var(--accent-blue); 
            position: relative; 
            background: #000; 
            border-radius: 10px; 
            margin: 20px auto; 
            width: 100%; 
        }
        .center-line { 
            position: absolute; 
            left: 50%; top: 0; bottom: 0; 
            width: 4px; 
            background: var(--accent-blue); 
            z-index: 10; 
            transform: translateX(-50%); 
            box-shadow: 0 0 15px var(--accent-blue); 
        }
        .reel { 
            display: flex; 
            align-items: center; 
            position: absolute; 
            left: 0; height: 100%; 
            transition: transform 3.5s cubic-bezier(0.15, 0.8, 0.2, 1);
        }
        .reel-item { 
            min-width: 180px; 
            width: 180px; 
            text-align: center; 
        }
        .reel-item img { height: 100px; width: 150px; object-fit: contain; }
        .reel-item span { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }

        /* Rewards Tray */
        #rewards-tray { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 30px; 
            min-height: 120px;
        }
        .reward-pill { 
            background: #001a2e; 
            border: 1px solid var(--accent-blue); 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            width: 120px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .reward-pill img { width: 100%; height: 60px; object-fit: contain; display: block; margin-bottom: 5px; }
        .reward-pill span { font-size: 0.7rem; font-weight: 700; color: #fff; }

        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        /* Grid View */
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .weapon-card { background: #000; border: 1px solid rgba(0, 170, 255, 0.2); border-radius: 8px; padding: 15px; }
        .weapon-card img { width: 100%; height: 100px; object-fit: contain; }
        .weapon-card h4 { margin: 10px 0 0; font-size: 0.8rem; color: var(--accent-blue); }
    </style>
</head>
<body>

    <div class="video-bg"><div id="player"></div></div>
    <div class="vignette"></div>
    <div id="star-container"></div>

    <div class="nav-container">
        <img src="images/Logo.png" alt="Logo" class="logo">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('test')">Test Drop</div>
            <div class="nav-btn" onclick="showTab('tier0')">Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">Tier 2</div>
            <div class="nav-btn active" onclick="showTab('randomize')">Randomize</div>
        </div>
    </div>

    <div class="main-wrapper">
        <!-- Spinner Section -->
        <div id="randomize-view" class="section-box">
            <h2 style="color:var(--accent-blue);">FACTION WEAPON DROP</h2>
            <div style="margin: 20px 0; display: flex; justify-content: center; gap: 10px;">
                <select id="spinTierSelect" class="theme-select">
                    <option value="test">Test Drop</option>
                    <option value="tier0">Tier 0</option>
                    <option value="tier1">Tier 1</option>
                    <option value="tier15">Tier 1.5</option>
                    <option value="tier2">Tier 2</option>
                </select>
                <button class="spin-btn" id="masterSpinBtn" onclick="processFullDrop()">Start Spin Sequence</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>
            <h3 id="spin-status" style="color:var(--accent-blue); height: 24px;">Ready to Spin</h3>
            <div id="rewards-tray"></div>
        </div>

        <!-- Gallery Section -->
        <div id="gallery-view" class="section-box" style="display:none;">
            <h2 id="gallery-title" style="color:var(--accent-blue); text-transform: uppercase;"></h2>
            <div class="weapon-grid" id="wpn-grid"></div>
        </div>
    </div>

    <!-- Music Player -->
    <div class="music-card">
        <img src="" id="m-art" class="album-art">
        <div class="track-info">
            <span id="m-title" class="song-name">Loading...</span>
            <div class="controls">
                <i class="fas fa-backward ctrl-btn" onclick="changeSong(-1)"></i>
                <i class="fas fa-play ctrl-btn" id="play-btn" onclick="togglePlay()"></i>
                <i class="fas fa-forward ctrl-btn" onclick="changeSong(1)"></i>
                <i class="fas fa-volume-mute ctrl-btn" onclick="toggleMute()" style="margin-left:auto;"></i>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
    // ================= DATA =================
    const DB = {
        test: [{name:"Sentinel", img:"images/Sentinel.png"}, {name:"Glock19X Tan", img:"images/Glock19XTan.png"}, {name:"Glock 22", img:"images/Glock 22.png"}, {name:"G365X", img:"images/G365X.png"}],
        tier0: [{name:"1911", img:"images/1911.png"}, {name:"Glock 17", img:"images/Glockk17.png"}, {name:"Glock 40", img:"images/Glock40.png"}, {name:"PX4", img:"images/PX4.png"}, {name:"Glock 19Gen 5", img:"images/Glock19Gen5.png"}, {name:"Glock 21Gen 5", img:"images/Glock21Gen5.png"}],
        tier1: [{name:"Glock 17 Gen 5", img:"images/Glockk17Gen5.png"}, {name:"Glock 45", img:"images/Glock45.png"}, {name:"Glock 19x8", img:""}, {name:"Glock 19 GEN5", img:"images/Glockk19Gen5.png"}, {name:"Glock 17", img:"images/Glock17.png"}, {name:"Glock 17 Gen 3", img:"images/Glock17GEN5.png"}],
        tier15: [{name:"3 inch Arp Tan", img:"images/3incharp.png"}, {name:"Psa Dagger", img:"images/PSADAGGER.png"}, {name:"Glock 19 FDE Gen 4", img:"images/G19FDEGEN4.png"}, {name:"Ruger Sr40", img:"images/Ruger.png"}, {name:"Glock 19XB", img:"images/Glock19XB.png"}],
        tier2: [{name:"Glock 43X Switch", img:"images/Glock43XSwitch.png"}, {name:"Glock 40 Camo", img:"images/Glock40Camo.png"}, {name:"Sig P365x", img:"images/Sig.png"}, {name:"Glock 40", img:"images/Glock40Custom.png"}, {name:"Glock 17 Switch", img:"images/Glock17Switch.png"}, {name:"Black Micro Draco", img:"images/BlackDraco.png"}]
    };

    const config = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 7 };
    const ITEM_WIDTH = 180;
    let lastWonWeaponName = "";

    // ================= APP LOGIC =================
    function showTab(tier) {
        const gal = document.getElementById('gallery-view');
        const ran = document.getElementById('randomize-view');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        if(tier === 'randomize') {
            gal.style.display = 'none'; ran.style.display = 'block';
        } else {
            gal.style.display = 'block'; ran.style.display = 'none';
            document.getElementById('gallery-title').innerText = tier;
            const grid = document.getElementById('wpn-grid');
            grid.innerHTML = DB[tier].map(i => `<div class="weapon-card"><img src="${i.img}"><h4>${i.name}</h4></div>`).join('');
        }
    }

    async function processFullDrop() {
        const tier = document.getElementById('spinTierSelect').value;
        const count = config[tier];
        const btn = document.getElementById('masterSpinBtn');
        const status = document.getElementById('spin-status');
        const tray = document.getElementById('rewards-tray');

        btn.disabled = true;
        tray.innerHTML = "";
        lastWonWeaponName = "";

        for(let i=0; i<count; i++) {
            status.innerText = `SPINNING ${i+1} OF ${count}...`;
            await performSingleSpin(tier);
            await new Promise(r => setTimeout(r, 800));
        }

        status.innerText = "ALL REWARDS CLAIMED";
        btn.disabled = false;
    }

    function performSingleSpin(tier) {
        return new Promise((resolve) => {
            const reel = document.getElementById('reel');
            const viewport = document.querySelector('.viewport');
            const tray = document.getElementById('rewards-tray');
            const pool = [...DB[tier]];

            // 1. Anti-Duplicate Picker
            let winner;
            let attempts = 0;
            do {
                winner = pool[Math.floor(Math.random() * pool.length)];
                attempts++;
            } while (winner.name === lastWonWeaponName && attempts < 5);
            lastWonWeaponName = winner.name;

            // 2. Immediate Hard Reset (No animation back)
            reel.style.transition = "none";
            reel.style.transform = "translateX(0px)";
            
            // Build 100 items for the reel
            reel.innerHTML = "";
            for(let i=0; i<100; i++) {
                const item = (i === 75) ? winner : pool[Math.floor(Math.random()*pool.length)];
                const div = document.createElement('div');
                div.className = "reel-item";
                div.innerHTML = `<img src="${item.img}"><br><span>${item.name}</span>`;
                reel.appendChild(div);
            }

            // Force reflow
            void reel.offsetWidth;

            // 3. Start Spin Animation
            const winIdx = 75;
            const landingVar = Math.floor(Math.random() * 120) + 30; // Random landing spot in box
            const targetX = (winIdx * ITEM_WIDTH) - (viewport.offsetWidth / 2) + landingVar;

            reel.style.transition = "transform 3.5s cubic-bezier(0.15, 0.8, 0.2, 1)";
            reel.style.transform = `translateX(-${targetX}px)`;

            // 4. Handle Result
            setTimeout(() => {
                const p = document.createElement('div');
                p.className = "reward-pill";
                p.innerHTML = `<img src="${winner.img}"><span>${winner.name}</span>`;
                tray.appendChild(p);
                resolve();
            }, 3700);
        });
    }

    // ================= MUSIC & STARS =================
    const playlist = [
        { id: 'P-t6zMIicF8', title: 'Triple 3', art: 'https://i.ytimg.com/vi/P-t6zMIicF8/maxresdefault.jpg' },
        { id: 'D49adOjVNcs', title: 'Button Land', art: 'https://i.ytimg.com/vi/D49adOjVNcs/maxresdefault.jpg' },
        { id: 'u-IXlswneL4', title: 'PINK SWITCH', art: 'https://i.ytimg.com/vi/u-IXlswneL4/maxresdefault.jpg' }
    ];
    let curIdx = 0, ytPlayer;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            videoId: playlist[curIdx].id,
            playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1 },
            events: { 
                'onReady': (e) => { e.target.playVideo(); updateMusicUI(); },
                'onStateChange': (e) => { if(e.data === 0) changeSong(1); }
            }
        });
    }
    function updateMusicUI() {
        document.getElementById('m-title').innerText = playlist[curIdx].title;
        document.getElementById('m-art').src = playlist[curIdx].art;
    }
    function changeSong(d) {
        curIdx = (curIdx + d + playlist.length) % playlist.length;
        ytPlayer.loadVideoById(playlist[curIdx].id);
        updateMusicUI();
    }
    function togglePlay() {
        const s = ytPlayer.getPlayerState();
        if(s === 1) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
    }
    function toggleMute() {
        if(ytPlayer.isMuted()) ytPlayer.unMute(); else ytPlayer.mute();
    }

    setInterval(() => {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.getElementById('star-container').appendChild(s);
        setTimeout(() => s.remove(), 5000);
    }, 200);
    </script>
</body>
</html>
