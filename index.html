<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EngleWoodChicago Weapon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ================= EDITABLE SETTINGS ================= */
        :root {
            --accent-blue: #00aaff;
            --accent-green: #00ff44;
            --star-image: url('images/Star.png');
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: #00050a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }
        .video-bg iframe {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.2);
        }
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%);
            z-index: -1;
        }

        /* Star Rain */
        #star-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            width: 15px; height: 15px;
            background-image: var(--star-image);
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.5;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

        /* Navigation */
        .nav-container {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #00aaff;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 30px;
        }
        .logo {
            width: 80px;
            height: auto;
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            filter: drop-shadow(0 0 10px #00aaff) drop-shadow(0 0 20px #00aaff);
        }
        .top-nav { display: flex; overflow-x: auto; padding: 15px; gap: 15px; margin-left: 110px; }
        .nav-btn, .spin-btn, .theme-select {
            padding: 10px 25px;
            background: #02121f;
            border: 1px solid #00aaff;
            color: #00aaff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active, .spin-btn:hover:not(:disabled) {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 15px #00aaff;
        }

        /* Music Player Tray */
        .music-card {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 300px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 101;
            border: 1px solid rgba(0, 170, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        .album-art { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid #00aaff33; }
        .track-info { flex-grow: 1; overflow: hidden; }
        .status-label { font-size: 0.6rem; color: var(--accent-blue); font-weight: 900; }
        .song-name { font-size: 0.85rem; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .controls { display: flex; gap: 12px; margin-top: 5px; align-items: center; }
        .ctrl-btn { cursor: pointer; color: white; transition: 0.2s; font-size: 0.9rem; }
        .ctrl-btn:hover { color: var(--accent-blue); }

        /* Content Area */
        .main-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .section-box {
            background: rgba(2, 18, 31, 0.85);
            border: 1px solid #00aaff44;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .weapon-card { background: #000; border: 1px solid #00aaff33; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .weapon-card img { width: 100%; height: 120px; object-fit: contain; transition: 0.3s; }
        .weapon-card img:hover { filter: drop-shadow(0 0 15px #00aaff); transform: scale(1.05); }
        .weapon-name-label { margin-top: 12px; font-weight: 700; color: #00aaff; font-size: 0.9rem; text-transform: uppercase; }

        /* Wheel System */
        .viewport { height: 200px; overflow: hidden; border: 2px solid #00aaff; position: relative; background: #000; border-radius: 10px; margin: 20px auto; width: 100%; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: #00aaff; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px #00aaff; }
        .reel { display: flex; align-items: center; position: absolute; left: 0; height: 100%; }
        .reel-item { min-width: 180px; width: 180px; text-align: center; }
        .reel-item img { height: 100px; width: 150px; object-fit: contain; }
        #rewards-tray { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }
        .reward-pill { background: #001a2e; border: 1px solid #00aaff; padding: 10px; border-radius: 8px; text-align: center; animation: slideUp 0.4s ease-out; }
        .reward-pill img { width: 80px; display: block; margin: 0 auto; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="video-bg"><div id="player"></div></div>
    <div class="vignette"></div>
    <div id="star-container"></div>

    <div class="nav-container">
        <img src="images/Logo.png" alt="Englewood Logo" class="logo">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTab('test')">Test Drop</div>
            <div class="nav-btn" onclick="showTab('tier0')">Tier 0</div>
            <div class="nav-btn" onclick="showTab('tier1')">Tier 1</div>
            <div class="nav-btn" onclick="showTab('tier15')">Tier 1.5</div>
            <div class="nav-btn" onclick="showTab('tier2')">Tier 2</div>
            <div class="nav-btn" onclick="showTab('attachments')">Attachments</div>
            <div class="nav-btn active" onclick="showTab('randomize')">Randomize</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="gallery-view" class="section-box" style="display:none;">
            <h2 id="gallery-title" style="color:#00aaff">WEAPONS</h2>
            <div class="weapon-grid" id="wpn-grid"></div>
        </div>

        <div id="randomize-view" class="section-box">
            <h2 style="color:#00aaff;">Simulate a faction drop spin</h2>
            <div style="margin: 20px 0; display: flex; justify-content: center; gap: 15px; align-items: center;">
                <select id="spinTierSelect" class="theme-select">
                    <option value="test">Test Drop</option>
                    <option value="tier0">Tier 0</option>
                    <option value="tier1">Tier 1</option>
                    <option value="tier15">Tier 1.5</option>
                    <option value="tier2">Tier 2</option>
                    <option value="attachments">Attachments</option>
                </select>
                <button class="spin-btn" id="masterSpinBtn" onclick="processFullDrop()">Start Drop</button>
            </div>

            <div class="viewport">
                <div class="center-line"></div>
                <div id="reel" class="reel"></div>
            </div>
            <h3 id="spin-status" style="color:#00aaff; min-height: 1.5em;"></h3>
            <div id="rewards-tray"></div>
        </div>
    </div>

    <div class="music-card">
        <img src="" id="m-art" class="album-art">
        <div class="track-info">
            <div class="status-label">NOW PLAYING</div>
            <span id="m-title" class="song-name"></span>
            <div class="controls">
                <i class="fas fa-backward ctrl-btn" onclick="changeSong(-1)"></i>
                <i class="fas fa-play ctrl-btn" id="play-btn" onclick="togglePlay()"></i>
                <i class="fas fa-forward ctrl-btn" onclick="changeSong(1)"></i>
                <i class="fas fa-volume-mute ctrl-btn" id="mute-btn" onclick="toggleMute()" style="margin-left:auto;"></i>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
    // ================= MUSIC LOGIC =================
    const playlist = [
        { id: 'P-t6zMIicF8', title: 'Quan Getem Gone x FullyChop x Q50 - Triple 3', art: 'https://i.ytimg.com/vi/P-t6zMIicF8/maxresdefault.jpg' },
        { id: 'D49adOjVNcs', title: 'Lil Scoom89 - Button Land', art: 'https://i.ytimg.com/vi/D49adOjVNcs/maxresdefault.jpg' },
        { id: 'Crz8OzEFCtM', title: 'LA Capone - Murder', art: 'https://i.ytimg.com/vi/Crz8OzEFCtM/maxresdefault.jpg' },
        { id: 'SdRxE6mV3Ng', title: 'Babyy Walk - Flowers', art: 'https://i.ytimg.com/vi/SdRxE6mV3Ng/maxresdefault.jpg' },
        { id: 'm87x04K3IPA', title: 'Meezy - Jada Juke', art: 'https://i.ytimg.com/vi/m87x04K3IPA/sddefault.jpg' },
        { id: 'o-Q-59Nmp3c', title: 'Chuckyy - Me vs Me', art: 'https://i.ytimg.com/vi/o-Q-59Nmp3c/maxresdefault.jpg' },
        { id: 'MGVvaHEY27Y', title: 'Lil Scoom89 - Nightcrawler', art: 'https://i.ytimg.com/vi/MGVvaHEY27Y/maxresdefault.jpg' },
        { id: 'wS3CdFA9tFA', title: 'YFG Fatso - Dawg Baby', art: 'https://i.ytimg.com/vi/wS3CdFA9tFA/maxresdefault.jpg' },
        { id: '4BQZ-YgVGsk', title: 'Chuckyy - My World', art: 'https://i.ytimg.com/vi/4BQZ-YgVGsk/maxresdefault.jpg' },
        { id: '2mHDEqezA8I', title: 'YFG Fatso - Rylo Rod', art: 'https://i.ytimg.com/vi/2mHDEqezA8I/maxresdefault.jpg' },
        { id: 'tdzZlnRkVL4', title: 'YFG Fatso - Remedy', art: 'https://i.ytimg.com/vi/tdzZlnRkVL4/maxresdefault.jpg' },
        { id: '0XpIEXC9Qoo', title: 'Lil Twin - Hate Being Sober', art: 'https://i.ytimg.com/vi/0XpIEXC9Qoo/maxresdefault.jpg' },
        { id: 'GqYiG9YJ6Ig', title: 'Topoppgen - Cute Like Aspen', art: 'https://i.ytimg.com/vi/GqYiG9YJ6Ig/sddefault.jpg' },
        { id: 'YcEawcvot38', title: 'Lil Noonie - Ready or Not', art: 'https://i.ytimg.com/vi/YcEawcvot38/maxresdefault.jpg' },
        { id: 'YNh0PriDYSo', title: 'Glockboy Stank x Lil Noonie - Shark Business', art: 'https://i.ytimg.com/vi/YNh0PriDYSo/maxresdefault.jpg' },
        { id: 'RcHlcmiOmsI', title: 'Nardo Drillz x Glockboy Stank x Lil Noonie - 3 Headed Shark', art: 'https://i.ytimg.com/vi/RcHlcmiOmsI/maxresdefault.jpg' },
        { id: 'Us9BEYzqbXU', title: 'Bloodhound Lil Jeff - Should of Saw It', art: 'https://i.ytimg.com/vi/Us9BEYzqbXU/maxresdefault.jpg' },
        { id: '0cGHbEZOrzc', title: '9BMEECHIE - F*** JOJO', art: 'https://i.ytimg.com/vi/0cGHbEZOrzc/maxresdefault.jpg' },
        { id: 'u-IXlswneL4', title: '9BMEECHIE - PINK SWITCH', art: 'https://i.ytimg.com/vi/u-IXlswneL4/maxresdefault.jpg' }
    ];

    let currentIdx = Math.floor(Math.random() * playlist.length);
    let ytPlayer;

    function onYouTubeIframeAPIReady() {
        updateUI();
        ytPlayer = new YT.Player('player', {
            videoId: playlist[currentIdx].id,
            playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 0 },
            events: { 
                'onReady': (e) => e.target.playVideo(),
                'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) changeSong(1); }
            }
        });
    }

    function updateUI() {
        document.getElementById('m-title').innerText = playlist[currentIdx].title;
        document.getElementById('m-art').src = playlist[currentIdx].art;
    }

    function changeSong(dir) {
        currentIdx = (currentIdx + dir + playlist.length) % playlist.length;
        ytPlayer.loadVideoById(playlist[currentIdx].id);
        updateUI();
    }

    function togglePlay() {
        if (ytPlayer.getPlayerState() === 1) ytPlayer.pauseVideo();
        else ytPlayer.playVideo();
    }

    function toggleMute() {
        if (ytPlayer.isMuted()) ytPlayer.unMute();
        else ytPlayer.mute();
    }

    function createStar() {
        const container = document.getElementById('star-container');
        const star = document.createElement('div');
        star.className = 'star';
        const duration = Math.random() * 3 + 2;
        star.style.left = Math.random() * 100 + 'vw';
        star.style.animationDuration = duration + 's';
        container.appendChild(star);
        setTimeout(() => star.remove(), duration * 1000);
    }
    setInterval(createStar, 150);

    // ================= WEAPON DATABASE =================
    const DB = {
        test: [{name:"Sentinel", img:"images/Sentinel.png"}, {name:"Glock19X Tan", img:"images/Glock19XTan.png"}, {name:"Glock 22", img:"images/Glock 22.png"}, {name:"G365X", img:"images/G365X.png"}],
        tier0: [{name:"1911", img:"images/1911.png"}, {name:"Glock 17", img:"images/Glockk17.png"}, {name:"Glock 40", img:"images/Glock40.png"}, {name:"PX4", img:"images/PX4.png"}, {name:"Glock 19Gen 5", img:"images/Glock19Gen5.png"}, {name:"Glock 21Gen 5", img:"images/Glock21Gen5.png"}],
        tier1: [{name:"Glock 17 Gen 5", img:"images/Glockk17Gen5.png"}, {name:"Glock 45", img:"images/Glock45.png"}, {name:"Glock 19x8", img:""}, {name:"Glock 19 GEN5", img:"images/Glockk19Gen5.png"}, {name:"Glock 17", img:"images/Glock17.png"}, {name:"Glock 17 Gen 3", img:"images/Glock17GEN5.png"}],
        tier15: [{name:"3 inch Arp Tan", img:"images/3incharp.png"}, {name:"Psa Dagger", img:"images/PSADAGGER.png"}, {name:"Glock 19 FDE Gen 4", img:"images/G19FDEGEN4.png"}, {name:"Ruger Sr40", img:"images/Ruger.png"}, {name:"Glock 19XB", img:"images/Glock19XB.png"}],
        tier2: [{name:"Glock 43X Switch", img:"images/Glock43XSwitch.png"}, {name:"Glock 40 Camo", img:"images/Glock40Camo.png"}, {name:"Sig P365x", img:"images/Sig.png"}, {name:"Glock 40", img:"images/Glock40Custom.png"}, {name:"Glock 17 Switch", img:"images/Glock17Switch.png"}, {name:"Black Micro Draco", img:"images/BlackDraco.png"}],
        attachments: [{name:"Clear Kriss Vector", img:"images/ClearKriss.png"}, {name:"Black Kriss Vector", img:"images/BlackKriss.png"}, {name:"White Kriss Vector", img:"images/WhiteKriss.png"}, {name:"Tan Kriss Vector", img:"images/TanKriss.png"}, {name:"Black Extended Mag", img:"images/Blackextendedclip.png"}, {name:"Tan Extended Mag", img:"images/Tanextendedclip.png"}]
    };

    const CROSS_TIER_LOGIC = {
        tier0: ["Sentinel", "G365X"],
        tier1: ["Glock 21Gen 5", "PX4"],
        tier15: ["Glock 19x8", "RMGlock 17Gen 3", "Glock 45", "RMGlock 17"],
        tier2: ["Ruger Sr40", "Glock 19XB"]
    };

    const config = { test: 2, tier0: 4, tier1: 5, tier15: 5, tier2: 7, attachments: 1 };
    const ITEM_WIDTH = 180;
    
    // HISTORY BUFFER (Tracks the last won weapon)
    let lastWonWeaponName = "";

    function showTab(tier) {
        const gallery = document.getElementById('gallery-view');
        const randomize = document.getElementById('randomize-view');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if(tier === 'randomize') { gallery.style.display = 'none'; randomize.style.display = 'block'; } 
        else { gallery.style.display = 'block'; randomize.style.display = 'none'; document.getElementById('gallery-title').innerText = tier.toUpperCase(); renderGrid(tier); }
    }

    function renderGrid(tier) {
        const grid = document.getElementById('wpn-grid');
        grid.innerHTML = "";
        DB[tier].forEach(item => {
            const div = document.createElement('div');
            div.className = "weapon-card";
            div.innerHTML = `<img src="${item.img}"><span class="weapon-name-label">${item.name}</span>`;
            grid.appendChild(div);
        });
    }

    function buildReel(targetPool, winner) {
        const reel = document.getElementById('reel');
        reel.innerHTML = "";
        const totalItems = 100;
        const items = [];
        for(let i=0; i<totalItems; i++) {
            // Index 75 is the winner
            const weapon = (i === 75) ? winner : targetPool[Math.floor(Math.random()*targetPool.length)];
            const div = document.createElement('div');
            div.className = "reel-item";
            div.innerHTML = `<img src="${weapon.img}"><br><span>${weapon.name}</span>`;
            reel.appendChild(div);
            items.push(weapon);
        }
    }

    async function processFullDrop() {
        const tier = document.getElementById('spinTierSelect').value;
        const count = config[tier];
        const btn = document.getElementById('masterSpinBtn');
        const tray = document.getElementById('rewards-tray');
        const status = document.getElementById('spin-status');
        
        btn.disabled = true; 
        tray.innerHTML = "";
        lastWonWeaponName = ""; // Reset history for new drop session

        for(let i=0; i<count; i++) {
            status.innerText = `Spinning ${i+1} of ${count}...`;
            await performSingleSpin(tier);
            await new Promise(r => setTimeout(r, 1000));
        }
        status.innerText = "Drop Complete!";
        btn.disabled = false;
    }

    function performSingleSpin(tier) {
        return new Promise((resolve) => {
            const reel = document.getElementById('reel');
            const viewport = document.querySelector('.viewport');
            const tray = document.getElementById('rewards-tray');
            const status = document.getElementById('spin-status');
            
            let spinPool = [...DB[tier]];
            // Add cross-tier luck logic
            if (tier === 'tier0') spinPool.push(...DB.test.filter(w => CROSS_TIER_LOGIC.tier0.includes(w.name)));
            else if (tier === 'tier1') spinPool.push(...DB.tier0.filter(w => CROSS_TIER_LOGIC.tier1.includes(w.name)));
            else if (tier === 'tier15') spinPool.push(...DB.tier1.filter(w => CROSS_TIER_LOGIC.tier15.includes(w.name)));
            else if (tier === 'tier2') spinPool.push(...DB.tier15.filter(w => CROSS_TIER_LOGIC.tier2.includes(w.name)));

            // 1. PICK WINNER WITH ANTI-DUPLICATE LOGIC
            let winner = spinPool[Math.floor(Math.random() * spinPool.length)];
            let attempts = 0;

            // If winner is same as last one, try to re-pick up to 3 times
            while(winner.name === lastWonWeaponName && attempts < 3) {
                winner = spinPool[Math.floor(Math.random() * spinPool.length)];
                attempts++;
                if(attempts > 0) console.log("Anti-Duplicate: Re-rolling...");
            }
            
            lastWonWeaponName = winner.name; // Update history

            // 2. BUILD THE REEL VISUALLY
            buildReel(spinPool, winner);
            
            // 3. ANIMATION
            reel.style.transition = "none";
            reel.style.transform = "translateX(0px)";
            reel.offsetHeight; 
            
            const winIndex = 75;
            const centerOffset = (viewport.offsetWidth / 2) - (ITEM_WIDTH / 2);
            const targetX = (winIndex * ITEM_WIDTH) - centerOffset;
            
            reel.style.transition = "transform 3s cubic-bezier(0.15, 0.8, 0.2, 1)";
            reel.style.transform = `translateX(-${targetX}px)`;
            
            setTimeout(() => {
                const p = document.createElement('div');
                p.className = "reward-pill";
                p.innerHTML = `<img src="${winner.img}"><span>${winner.name}</span>`;
                tray.appendChild(p);
                resolve();
            }, 3200);
        });
    }
    </script>
</body>
</html>
